services:
  iptv-checker:
    image: ghcr.io/cgg888/iptv-checker:latest
    container_name: iptv-checker
    network_mode: "host"
    environment:
      - NODE_ENV=production
      - TZ=Asia/Shanghai
      - PORT=${IPTV_PORT:-3000}
    volumes:
      - ./data:/app/data
      - ./.git:/app/.git
    restart: unless-stopped

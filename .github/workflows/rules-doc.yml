        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'docs: auto-update rules documentation'
          title: 'docs: Auto-update rules documentation'
          body: |
            ## Summary

            Auto-generated PR to update rules documentation.

            **Changes:**
            - Updated rules table in docs/replay-rules/rules.md

            This PR was automatically created by the `rules-doc.yml` workflow.
          branch: docs/update-rules

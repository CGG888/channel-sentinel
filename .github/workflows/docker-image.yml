name: Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - 'docker-compose.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # 强制使用小写镜像名
  IMAGE_NAME: ${{ github.repository_owner }}/iptv-checker

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version from package.json
        id: pkg
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Auto create tag from package.json if missing
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/github-script@v7
        with:
          script: |
            const ver = '${{ steps.pkg.outputs.version }}';
            if (!ver) { core.info('No version found'); return; }
            const tag = `v${ver}`;
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: context.sha });
                core.info(`Created tag ${tag} at ${context.sha}`);
              } else {
                throw e;
              }
            }

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern=v{{version}}
            type=semver,pattern={{version}}
            type=semver,pattern=v{{major}}.{{minor}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF_NAME}"
          else
            RAW="v${{ steps.pkg.outputs.version }}"
          fi
          RAW="$(echo "$RAW" | tr -d '[:space:]')"
          RAW="${RAW#tag=}"
          RAW="${RAW#refs/tags/}"
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "strip=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Build release notes from README
        if: startsWith(github.ref, 'refs/tags/')
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          SEC=$(awk -v tag="$TAG" '
            $0 ~ "^###[ ]+"tag"[ ]" {found=1; print; next}
            /^###[ ]+v[0-9]+\.[0-9]+\.[0-9]+/ && found {exit}
            found {print}
          ' README.md)
          {
            echo "$TAG"
            echo
            echo "$SEC"
          } > release_notes.txt
          echo "path=release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Build Docker Hub description
        if: startsWith(github.ref, 'refs/tags/') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          {
            echo "# IPTV Checker"
            echo
            echo "Tag: $TAG"
            echo
            echo "## Release Notes"
            cat release_notes.txt
            echo
            echo "## Links"
            echo "- Source: https://github.com/${{ github.repository }}"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          } > dockerhub_desc.md
      - name: Update Docker Hub description
        if: startsWith(github.ref, 'refs/tags/') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/iptv-checker
          readme-filepath: dockerhub_desc.md

      - name: Login to Docker Hub
        if: startsWith(github.ref, 'refs/tags/') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Sync tags to Docker Hub
        if: startsWith(github.ref, 'refs/tags/') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          STRIP=${TAG#v}
          GH_OWNER="${{ github.repository_owner }}"
          DH_OWNER="${{ env.DOCKERHUB_USERNAME }}"
          if [ -z "$DH_OWNER" ]; then
            DH_OWNER="${{ github.repository_owner }}"
          fi
          GH_OWNER_LC=$(echo "$GH_OWNER" | tr '[:upper:]' '[:lower:]')
          DH_OWNER_LC=$(echo "$DH_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE=iptv-checker
          SRC1=ghcr.io/$GH_OWNER_LC/$IMAGE:$TAG
          SRC2=ghcr.io/$GH_OWNER_LC/$IMAGE:$STRIP
          DST1=$DH_OWNER_LC/$IMAGE:$TAG
          DST2=$DH_OWNER_LC/$IMAGE:$STRIP

          echo "Syncing $SRC1 -> $DST1"
          n=0
          until [ $n -ge 40 ]
          do
            if docker pull "$SRC1"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC1..."
            sleep 15
          done
          docker tag "$SRC1" "$DST1"
          docker push "$DST1"

          echo "Syncing $SRC2 -> $DST2"
          n=0
          until [ $n -ge 40 ]
          do
            if docker pull "$SRC2"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC2..."
            sleep 15
          done
          docker tag "$SRC2" "$DST2"
          docker push "$DST2"

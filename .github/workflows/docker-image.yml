name: Docker Image CI

on:
  push:
    branches: [ "main", "master" ]
    paths:
      - 'package.json'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. v1.3.2 or 1.3.2). Empty = package.json'
        required: false
        type: string
      target:
        description: 'Target commit SHA for the tag/release (optional)'
        required: false
        type: string
  pull_request:
    branches: [ "main", "master" ]
    paths:
      - 'src/**'
      - 'public/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - 'docker-compose.yml'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  # 强制使用小写镜像名
  IMAGE_NAME: ${{ github.repository_owner }}/channel-sentinel

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Read version from package.json
        id: pkg
        run: |
          VER=$(node -p "require('./package.json').version")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Auto create tag from package.json if missing
        if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
        uses: actions/github-script@v7
        with:
          script: |
            const ver = '${{ steps.pkg.outputs.version }}';
            if (!ver) { core.info('No version found'); return; }
            const tag = `v${ver}`;
            const { owner, repo } = context.repo;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.info(`Tag ${tag} already exists`);
            } catch (e) {
              if (e.status === 404) {
                await github.rest.git.createRef({ owner, repo, ref: `refs/tags/${tag}`, sha: context.sha });
                core.info(`Created tag ${tag} at ${context.sha}`);
              } else {
                throw e;
              }
            }

      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            RAW="${{ inputs.version }}"
          elif [ "${{ github.event_name }}" = "push" ] && [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            RAW="${GITHUB_REF_NAME}"
          else
            RAW="v${{ steps.pkg.outputs.version }}"
          fi
          RAW="$(echo "$RAW" | tr -d '[:space:]')"
          RAW="${RAW#tag=}"
          RAW="${RAW#refs/tags/}"
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "strip=${RAW#v}" >> "$GITHUB_OUTPUT"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Service quality gate (node direct)
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
        run: node src/utils/run-service-gate-with-server.js

      - name: Build gate trend dashboard
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_HISTORY_PATH: artifacts/service-gate-history.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_TREND_MARKDOWN_PATH: artifacts/service-gate-trend.md
          SERVICE_GATE_TREND_WINDOW: "20"
          SERVICE_GATE_HISTORY_MAX: "300"
          SERVICE_GATE_DYNAMIC_MIN_RUNS: "8"
          SERVICE_GATE_DYNAMIC_ALPHA: "0.6"
          SERVICE_GATE_DYNAMIC_MAX_DRIFT: "2"
        run: node src/utils/service-gate-trend.js

      - name: Notify gate result by category
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_NOTIFY_JSON_PATH: artifacts/service-gate-notify.json
          SERVICE_GATE_NOTIFY_MARKDOWN_PATH: artifacts/service-gate-notify.md
          SERVICE_GATE_GOVERNANCE_JSON_PATH: artifacts/service-gate-governance.json
          SERVICE_GATE_GOVERNANCE_MARKDOWN_PATH: artifacts/service-gate-governance.md
          SERVICE_GATE_NOTIFY_CHANNEL: docker-image
          SERVICE_GATE_THRESHOLD_SERVICE_CRITICAL: "0"
          SERVICE_GATE_THRESHOLD_SMOKE_CRITICAL: "0"
          SERVICE_GATE_THRESHOLD_CONTRACT_HIGH: "1"
          SERVICE_GATE_THRESHOLD_CONTRACT_MEDIUM: "0"
          SERVICE_GATE_WEBHOOK_URL: ${{ secrets.SERVICE_GATE_WEBHOOK_URL }}
        run: node src/utils/service-gate-notify.js

      - name: Build ops domain dashboard and SOP
        if: always()
        env:
          OPS_DOMAIN_SOP_JSON_PATH: artifacts/ops-domain-sop.json
          OPS_DOMAIN_SOP_MARKDOWN_PATH: artifacts/ops-domain-sop.md
          OPS_LOW_FREQUENCY_WHITELIST: ""
          OPS_LOW_FREQUENCY_REQUEST_THRESHOLD: "30"
          OPS_LOW_FREQUENCY_LATENCY_THRESHOLD_MS: "3000"
        run: node src/utils/ops-domain-sop.js

      - name: Build low frequency governance
        if: always()
        env:
          OPS_LOW_FREQUENCY_GOVERNANCE_JSON_PATH: artifacts/ops-low-frequency-governance.json
          OPS_LOW_FREQUENCY_GOVERNANCE_MARKDOWN_PATH: artifacts/ops-low-frequency-governance.md
          OPS_LOW_FREQUENCY_WHITELIST: ""
          OPS_LOW_FREQUENCY_REQUEST_THRESHOLD: "30"
          OPS_LOW_FREQUENCY_LATENCY_THRESHOLD_MS: "3000"
        run: node src/utils/ops-low-frequency-governance.js

      - name: Build final acceptance and quarterly governance report
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_NOTIFY_JSON_PATH: artifacts/service-gate-notify.json
          SERVICE_GATE_GOVERNANCE_JSON_PATH: artifacts/service-gate-governance.json
          OPS_DOMAIN_SOP_JSON_PATH: artifacts/ops-domain-sop.json
          OPS_LOW_FREQUENCY_GOVERNANCE_JSON_PATH: artifacts/ops-low-frequency-governance.json
          FINAL_ACCEPTANCE_REPORT_JSON_PATH: artifacts/final-acceptance-report.json
          FINAL_ACCEPTANCE_REPORT_MARKDOWN_PATH: artifacts/final-acceptance-report.md
          QUARTERLY_GOVERNANCE_POLICY_JSON_PATH: artifacts/quarterly-governance-policy.json
          QUARTERLY_GOVERNANCE_POLICY_MARKDOWN_PATH: artifacts/quarterly-governance-policy.md
        run: node src/utils/final-acceptance-report.js

      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-summary-docker-image
          path: artifacts/service-gate-summary.json

      - name: Upload gate notify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-notify-docker-image
          path: |
            artifacts/service-gate-notify.json
            artifacts/service-gate-notify.md
            artifacts/service-gate-governance.json
            artifacts/service-gate-governance.md

      - name: Upload gate trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-trend-docker-image
          path: |
            artifacts/service-gate-history.json
            artifacts/service-gate-trend.json
            artifacts/service-gate-trend.md

      - name: Upload ops domain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-domain-sop-docker-image
          path: |
            artifacts/ops-domain-sop.json
            artifacts/ops-domain-sop.md

      - name: Upload ops low frequency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-low-frequency-governance-docker-image
          path: |
            artifacts/ops-low-frequency-governance.json
            artifacts/ops-low-frequency-governance.md

      - name: Upload final acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-acceptance-report-docker-image
          path: |
            artifacts/final-acceptance-report.json
            artifacts/final-acceptance-report.md
            artifacts/quarterly-governance-policy.json
            artifacts/quarterly-governance-policy.md

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # PR 构建仍带上 PR 标签
            type=ref,event=pr
            # 版本驱动：根据解析到的 tag 与 strip 标记（push/workflow_dispatch）
            type=raw,value=${{ steps.vars.outputs.tag }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=${{ steps.vars.outputs.strip }},enable=${{ github.event_name != 'pull_request' }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build release notes from README
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          SEC=$(awk -v tag="$TAG" '
            $0 ~ "^###[ ]+"tag"[ ]" {found=1; print; next}
            /^###[ ]+v[0-9]+\.[0-9]+\.[0-9]+/ && found {exit}
            found {print}
          ' README.md)
          {
            echo "$TAG"
            echo
            echo "$SEC"
          } > release_notes.txt
          echo "path=release_notes.txt" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
          target_commitish: ${{ inputs.target || github.sha }}

      - name: Build Docker Hub description
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          {
            echo "# Channel Sentinel"
            echo
            echo "Tag: $TAG"
            echo
            echo "## Release Notes"
            cat release_notes.txt
            echo
            echo "## Links"
            echo "- Source: https://github.com/${{ github.repository }}"
            echo "- Release: https://github.com/${{ github.repository }}/releases/tag/$TAG"
          } > dockerhub_desc.md
      - name: Update Docker Hub description
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/channel-sentinel
          readme-filepath: dockerhub_desc.md

      - name: Login to Docker Hub
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Sync tags to Docker Hub
        if: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          STRIP=${TAG#v}
          GH_OWNER="${{ github.repository_owner }}"
          DH_OWNER="${{ env.DOCKERHUB_USERNAME }}"
          if [ -z "$DH_OWNER" ]; then
            DH_OWNER="${{ github.repository_owner }}"
          fi
          GH_OWNER_LC=$(echo "$GH_OWNER" | tr '[:upper:]' '[:lower:]')
          DH_OWNER_LC=$(echo "$DH_OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE=channel-sentinel
          SRC1=ghcr.io/$GH_OWNER_LC/$IMAGE:$TAG
          SRC2=ghcr.io/$GH_OWNER_LC/$IMAGE:$STRIP
          DST1=$DH_OWNER_LC/$IMAGE:$TAG
          DST2=$DH_OWNER_LC/$IMAGE:$STRIP

          echo "Syncing $SRC1 -> $DST1"
          n=0
          until [ $n -ge 40 ]
          do
            if docker pull "$SRC1"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC1..."
            sleep 15
          done
          docker tag "$SRC1" "$DST1"
          docker push "$DST1"

          echo "Syncing $SRC2 -> $DST2"
          n=0
          until [ $n -ge 40 ]
          do
            if docker pull "$SRC2"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC2..."
            sleep 15
          done
          docker tag "$SRC2" "$DST2"
          docker push "$DST2"

          # Sync latest tag to Docker Hub (only when on default branch)
          if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.ref }}" = "refs/heads/master" ]; then
            SRC_LATEST=ghcr.io/$GH_OWNER_LC/$IMAGE:latest
            DST_LATEST=$DH_OWNER_LC/$IMAGE:latest
            echo "Syncing $SRC_LATEST -> $DST_LATEST"
            n=0
            until [ $n -ge 40 ]
            do
              if docker pull "$SRC_LATEST"; then
                break
              fi
              n=$((n+1))
              echo "Retry $n for $SRC_LATEST..."
              sleep 15
            done
            docker tag "$SRC_LATEST" "$DST_LATEST"
            docker push "$DST_LATEST"
          fi

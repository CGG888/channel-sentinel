name: GHCR Downloads Counter

on:
  workflow_dispatch:
  schedule:
    - cron: "21 2 * * *"
  push:
    branches: [ "main", "master" ]
    paths:
      - ".github/workflows/ghcr-downloads.yml"

permissions:
  contents: write

jobs:
  update-downloads-badge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute total downloads from GHCR pages
        id: dl
        shell: bash
        env:
          OWNER: CGG888
          REPO: Channel-Sentinel
          PKG: channel-sentinel
        run: |
          set +e
          set +o pipefail
          base="https://github.com/${OWNER}/${REPO}/pkgs/container/${PKG}/versions"
          total=0
          page=1
          while true; do
            url="${base}?page=${page}"
            html=$(curl -fsSL -H "User-Agent: Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -H "Accept-Language: en-US,en;q=0.8" "$url" || true)
            if [ -z "$html" ]; then
              break
            fi
            one_line=$(echo "$html" | tr '\n' ' ' | sed 's/,//g')
            cpage=$(echo "$one_line" | (grep -Eo '([0-9]+)[[:space:]]+Version download(s)?' || true) | awk '{sum+=$1} END{print sum+0}')
            if [ "$cpage" = "" ]; then cpage=0; fi
            total=$(( total + cpage ))
            next=$(echo "$one_line" | (grep -Eo 'rel="next"|aria-label="Next"' || true))
            if [ -z "$next" ]; then
              break
            fi
            page=$(( page + 1 ))
            if [ $page -gt 50 ]; then
              break
            fi
          done
          echo "total=$total" >> "$GITHUB_OUTPUT"
          echo "Total downloads: $total"

      - name: Write SVG badge to repository root
        shell: bash
        run: |
          total="${{ steps.dl.outputs.total }}"
          if [ -z "$total" ]; then total=0; fi
          url="https://img.shields.io/badge/GHCR%20Downloads-${total}-2ea44f?logo=github"
          curl -fsSL "$url" -o ghcr-downloads.svg.new
          if [ -f ghcr-downloads.svg ]; then
            if diff -q ghcr-downloads.svg ghcr-downloads.svg.new >/dev/null 2>&1; then
              echo "Badge unchanged"
              rm -f ghcr-downloads.svg.new
              exit 0
            fi
          fi
          mv ghcr-downloads.svg.new ghcr-downloads.svg
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ghcr-downloads.svg
          git commit -m "chore: update ghcr-downloads.svg to ${total}"
          git push

name: Release on Tag
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v1.2.2'
        required: false
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          RAW="$(echo "$RAW" | tr -d '[:space:]')"   # 去除空白
          RAW="${RAW#tag=}"                          # 兼容手动输入 'tag=v1.2.2'
          RAW="${RAW#refs/tags/}"                    # 兼容完整 ref
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "strip=${RAW#v}" >> "$GITHUB_OUTPUT"
      - name: Build release notes from README
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          SEC=$(awk -v tag="$TAG" '
            $0 ~ "^###[ ]+"tag"[ ]" {found=1; print; next}
            /^###[ ]+v[0-9]+\.[0-9]+\.[0-9]+/ && found {exit}
            found {print}
          ' README.md)
          {
            echo "$TAG"
            echo
            echo "$SEC"
          } > release_notes.txt
          echo "path=release_notes.txt" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release (tag push)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Create GitHub Release (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.vars.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: ${{ github.event_name == 'release' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Push tags to Docker Hub
        if: ${{ github.event_name == 'release' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          STRIP=${TAG#v}
          OWNER="${{ env.DOCKERHUB_USERNAME }}"
          if [ -z "$OWNER" ]; then
            OWNER="${{ github.repository_owner }}"
          fi
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE=iptv-checker
          SRC1=ghcr.io/$OWNER_LC/$IMAGE:$TAG
          SRC2=ghcr.io/$OWNER_LC/$IMAGE:$STRIP
          DST1=$OWNER_LC/$IMAGE:$TAG
          DST2=$OWNER_LC/$IMAGE:$STRIP

          echo "Syncing $SRC1 -> $DST1"
          n=0
          until [ $n -ge 10 ]
          do
            if docker pull "$SRC1"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC1..."
            sleep 15
          done

          docker tag "$SRC1" "$DST1"
          docker push "$DST1"

          echo "Syncing $SRC2 -> $DST2"
          n=0
          until [ $n -ge 10 ]
          do
            if docker pull "$SRC2"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC2..."
            sleep 15
          done

          docker tag "$SRC2" "$DST2"
          docker push "$DST2"

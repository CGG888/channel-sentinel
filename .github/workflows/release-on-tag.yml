name: Release on Tag
on:
  push:
    tags:
      - 'v*'
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v1.2.2'
        required: false
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          RAW="$(echo "$RAW" | tr -d '[:space:]')"   # 去除空白
          RAW="${RAW#tag=}"                          # 兼容手动输入 'tag=v1.2.2'
          RAW="${RAW#refs/tags/}"                    # 兼容完整 ref
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "strip=${RAW#v}" >> "$GITHUB_OUTPUT"
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Storage reconcile gate
        run: npm run db:reconcile:strict
      - name: Storage sqlite smoke gate
        run: npm run db:smoke:sqlite
      - name: Service quality gate (node direct)
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
        run: node src/utils/run-service-gate-with-server.js
      - name: Build gate trend dashboard
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_HISTORY_PATH: artifacts/service-gate-history.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_TREND_MARKDOWN_PATH: artifacts/service-gate-trend.md
          SERVICE_GATE_TREND_WINDOW: "20"
          SERVICE_GATE_HISTORY_MAX: "300"
          SERVICE_GATE_DYNAMIC_MIN_RUNS: "8"
          SERVICE_GATE_DYNAMIC_ALPHA: "0.6"
          SERVICE_GATE_DYNAMIC_MAX_DRIFT: "2"
        run: node src/utils/service-gate-trend.js
      - name: Notify gate result by category
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_NOTIFY_JSON_PATH: artifacts/service-gate-notify.json
          SERVICE_GATE_NOTIFY_MARKDOWN_PATH: artifacts/service-gate-notify.md
          SERVICE_GATE_GOVERNANCE_JSON_PATH: artifacts/service-gate-governance.json
          SERVICE_GATE_GOVERNANCE_MARKDOWN_PATH: artifacts/service-gate-governance.md
          SERVICE_GATE_NOTIFY_CHANNEL: release-on-tag
          SERVICE_GATE_THRESHOLD_SERVICE_CRITICAL: "0"
          SERVICE_GATE_THRESHOLD_SMOKE_CRITICAL: "0"
          SERVICE_GATE_THRESHOLD_CONTRACT_HIGH: "1"
          SERVICE_GATE_THRESHOLD_CONTRACT_MEDIUM: "0"
          SERVICE_GATE_WEBHOOK_URL: ${{ secrets.SERVICE_GATE_WEBHOOK_URL }}
        run: node src/utils/service-gate-notify.js
      - name: Build ops domain dashboard and SOP
        if: always()
        env:
          OPS_DOMAIN_SOP_JSON_PATH: artifacts/ops-domain-sop.json
          OPS_DOMAIN_SOP_MARKDOWN_PATH: artifacts/ops-domain-sop.md
          OPS_LOW_FREQUENCY_WHITELIST: ""
          OPS_LOW_FREQUENCY_REQUEST_THRESHOLD: "30"
          OPS_LOW_FREQUENCY_LATENCY_THRESHOLD_MS: "3000"
        run: node src/utils/ops-domain-sop.js
      - name: Build low frequency governance
        if: always()
        env:
          OPS_LOW_FREQUENCY_GOVERNANCE_JSON_PATH: artifacts/ops-low-frequency-governance.json
          OPS_LOW_FREQUENCY_GOVERNANCE_MARKDOWN_PATH: artifacts/ops-low-frequency-governance.md
          OPS_LOW_FREQUENCY_WHITELIST: ""
          OPS_LOW_FREQUENCY_REQUEST_THRESHOLD: "30"
          OPS_LOW_FREQUENCY_LATENCY_THRESHOLD_MS: "3000"
        run: node src/utils/ops-low-frequency-governance.js
      - name: Build final acceptance and quarterly governance report
        if: always()
        env:
          SERVICE_GATE_SUMMARY_PATH: artifacts/service-gate-summary.json
          SERVICE_GATE_TREND_PATH: artifacts/service-gate-trend.json
          SERVICE_GATE_NOTIFY_JSON_PATH: artifacts/service-gate-notify.json
          SERVICE_GATE_GOVERNANCE_JSON_PATH: artifacts/service-gate-governance.json
          OPS_DOMAIN_SOP_JSON_PATH: artifacts/ops-domain-sop.json
          OPS_LOW_FREQUENCY_GOVERNANCE_JSON_PATH: artifacts/ops-low-frequency-governance.json
          FINAL_ACCEPTANCE_REPORT_JSON_PATH: artifacts/final-acceptance-report.json
          FINAL_ACCEPTANCE_REPORT_MARKDOWN_PATH: artifacts/final-acceptance-report.md
          QUARTERLY_GOVERNANCE_POLICY_JSON_PATH: artifacts/quarterly-governance-policy.json
          QUARTERLY_GOVERNANCE_POLICY_MARKDOWN_PATH: artifacts/quarterly-governance-policy.md
        run: node src/utils/final-acceptance-report.js
      - name: Upload gate summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-summary-release-on-tag
          path: artifacts/service-gate-summary.json
      - name: Upload gate notify artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-notify-release-on-tag
          path: |
            artifacts/service-gate-notify.json
            artifacts/service-gate-notify.md
            artifacts/service-gate-governance.json
            artifacts/service-gate-governance.md
      - name: Upload gate trend artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: service-gate-trend-release-on-tag
          path: |
            artifacts/service-gate-history.json
            artifacts/service-gate-trend.json
            artifacts/service-gate-trend.md
      - name: Upload ops domain artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-domain-sop-release-on-tag
          path: |
            artifacts/ops-domain-sop.json
            artifacts/ops-domain-sop.md
      - name: Upload ops low frequency artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ops-low-frequency-governance-release-on-tag
          path: |
            artifacts/ops-low-frequency-governance.json
            artifacts/ops-low-frequency-governance.md
      - name: Upload final acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-acceptance-report-release-on-tag
          path: |
            artifacts/final-acceptance-report.json
            artifacts/final-acceptance-report.md
            artifacts/quarterly-governance-policy.json
            artifacts/quarterly-governance-policy.md
      - name: Build release notes from README
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          SEC=$(awk -v tag="$TAG" '
            $0 ~ "^###[ ]+"tag"[ ]" {found=1; print; next}
            /^###[ ]+v[0-9]+\.[0-9]+\.[0-9]+/ && found {exit}
            found {print}
          ' README.md)
          {
            echo "$TAG"
            echo
            echo "$SEC"
            echo
            if [ -f artifacts/service-gate-notify.md ]; then
              cat artifacts/service-gate-notify.md
            fi
            echo
            if [ -f artifacts/service-gate-trend.md ]; then
              cat artifacts/service-gate-trend.md
            fi
            echo
            if [ -f artifacts/service-gate-governance.md ]; then
              cat artifacts/service-gate-governance.md
            fi
            echo
            if [ -f artifacts/ops-domain-sop.md ]; then
              cat artifacts/ops-domain-sop.md
            fi
            echo
            if [ -f artifacts/ops-low-frequency-governance.md ]; then
              cat artifacts/ops-low-frequency-governance.md
            fi
            echo
            if [ -f artifacts/final-acceptance-report.md ]; then
              cat artifacts/final-acceptance-report.md
            fi
            echo
            if [ -f artifacts/quarterly-governance-policy.md ]; then
              cat artifacts/quarterly-governance-policy.md
            fi
          } > release_notes.txt
          echo "path=release_notes.txt" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release (tag push)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Create GitHub Release (manual)
        if: ${{ github.event_name == 'workflow_dispatch' && steps.vars.outputs.tag != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Login to Docker Hub
        if: ${{ github.event_name == 'release' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
      - name: Push tags to Docker Hub
        if: ${{ github.event_name == 'release' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          STRIP=${TAG#v}
          OWNER="${{ env.DOCKERHUB_USERNAME }}"
          if [ -z "$OWNER" ]; then
            OWNER="${{ github.repository_owner }}"
          fi
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          IMAGE=iptv-checker
          SRC1=ghcr.io/$OWNER_LC/$IMAGE:$TAG
          SRC2=ghcr.io/$OWNER_LC/$IMAGE:$STRIP
          DST1=$OWNER_LC/$IMAGE:$TAG
          DST2=$OWNER_LC/$IMAGE:$STRIP

          echo "Syncing $SRC1 -> $DST1"
          n=0
          until [ $n -ge 10 ]
          do
            if docker pull "$SRC1"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC1..."
            sleep 15
          done

          docker tag "$SRC1" "$DST1"
          docker push "$DST1"

          echo "Syncing $SRC2 -> $DST2"
          n=0
          until [ $n -ge 10 ]
          do
            if docker pull "$SRC2"; then
              break
            fi
            n=$((n+1))
            echo "Retry $n for $SRC2..."
            sleep 15
          done

          docker tag "$SRC2" "$DST2"
          docker push "$DST2"

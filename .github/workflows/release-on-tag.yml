name: Release on Tag
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, e.g. v1.2.2'
        required: false
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag name
        id: vars
        shell: bash
        run: |
          RAW=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            RAW="${{ inputs.tag }}"
          else
            RAW="${GITHUB_REF_NAME}"
          fi
          RAW="$(echo "$RAW" | tr -d '[:space:]')"   # 去除空白
          RAW="${RAW#tag=}"                          # 兼容手动输入 'tag=v1.2.2'
          RAW="${RAW#refs/tags/}"                    # 兼容完整 ref
          echo "tag=$RAW" >> "$GITHUB_OUTPUT"
          echo "strip=${RAW#v}" >> "$GITHUB_OUTPUT"
      - name: Build release notes from README
        id: notes
        shell: bash
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          if [ -z "$TAG" ]; then
            TAG="${GITHUB_REF_NAME}"
          fi
          SEC=$(awk -v tag="$TAG" '
            $0 ~ "^###[ ]+"tag"[ ]" {found=1; print; next}
            /^###[ ]+v[0-9]+\.[0-9]+\.[0-9]+/ && found {exit}
            found {print}
          ' README.md)
          {
            echo "$TAG"
            echo
            echo "$SEC"
          } > release_notes.txt
          echo "path=release_notes.txt" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release (tag push)
        if: ${{ github.event_name == 'push' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: ${{ steps.vars.outputs.tag }}
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image tags
        id: meta
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          STRIP=${TAG#v}
          REPO=${OWNER_LC}/iptv-checker
          echo "tags=ghcr.io/$REPO:$TAG,ghcr.io/$REPO:$STRIP" >> $GITHUB_OUTPUT
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Login to Aliyun Registry
        if: ${{ env.ACR_USERNAME != '' && env.ACR_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}
      - name: Push tags to Aliyun
        if: ${{ env.ACR_USERNAME != '' && env.ACR_PASSWORD != '' }}
        run: |
          TAG="${{ steps.vars.outputs.tag }}"
          OWNER="${{ github.repository_owner }}"
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          STRIP=${TAG#v}
          IMAGE=iptv-checker
          SRC1=ghcr.io/$OWNER_LC/$IMAGE:$TAG
          SRC2=ghcr.io/$OWNER_LC/$IMAGE:$STRIP
          DST1=registry.cn-hongkong.aliyuncs.com/$OWNER_LC/$IMAGE:$TAG
          DST2=registry.cn-hongkong.aliyuncs.com/$OWNER_LC/$IMAGE:$STRIP
          docker pull $SRC1
          docker tag $SRC1 $DST1
          docker push $DST1
          docker pull $SRC2
          docker tag $SRC2 $DST2
          docker push $DST2

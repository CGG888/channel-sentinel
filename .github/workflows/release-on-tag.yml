name: Release on Tag
on:
  push:
    tags:
      - 'v*'
permissions:
  contents: write
  packages: write
jobs:
  release:
    runs-on: ubuntu-latest
    env:
      ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
      ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract image tags
        id: meta
        run: |
          TAG=${GITHUB_REF_NAME}
          STRIP=${TAG#v}
          REPO=${{ github.repository_owner }}/iptv-checker
          echo "tags=ghcr.io/$REPO:$TAG,ghcr.io/$REPO:$STRIP" >> $GITHUB_OUTPUT
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Login to Aliyun Registry
        if: ${{ env.ACR_USERNAME != '' && env.ACR_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ env.ACR_USERNAME }}
          password: ${{ env.ACR_PASSWORD }}
      - name: Push tags to Aliyun
        if: ${{ env.ACR_USERNAME != '' && env.ACR_PASSWORD != '' }}
        run: |
          TAG=${GITHUB_REF_NAME}
          STRIP=${TAG#v}
          OWNER=${{ github.repository_owner }}
          IMAGE=iptv-checker
          SRC1=ghcr.io/$OWNER/$IMAGE:$TAG
          SRC2=ghcr.io/$OWNER/$IMAGE:$STRIP
          DST1=registry.cn-hongkong.aliyuncs.com/$OWNER/$IMAGE:$TAG
          DST2=registry.cn-hongkong.aliyuncs.com/$OWNER/$IMAGE:$STRIP
          docker pull $SRC1
          docker tag $SRC1 $DST1
          docker push $DST1
          docker pull $SRC2
          docker tag $SRC2 $DST2
          docker push $DST2

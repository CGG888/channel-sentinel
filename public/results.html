    <script>

                if (!j.success) {
                    window.location.href = '/login.html';
                } else {
                    window.currentUser = j.username;
                    // 等待DOM加载后更新
                    function updateDisplay() {
                         const userDisplay = document.getElementById('userDisplay');

                        document.addEventListener('DOMContentLoaded', updateDisplay);

            } catch(e) {
                window.location.href = '/login.html';

<script>
let streams = [];

let __debugVisible = false;
const LOGO_TPLS_KEY = 'logoTemplates';
const LOGO_CURR_KEY = 'logoTemplateCurrentId';
let selectedRes = new Set();
let resPageSize = 20;
let resCurrentPage = 1;
let groupRulesMap = {};
function getGroupRulesFromLocal() {
  const list = getGroupTitles();
  const arr = Array.isArray(list) ? list : [];
  return arr.map(x => ({ name: x && x.name ? x.name : '', matchers: Array.isArray(x && x.matchers) ? x.matchers : [] })).filter(x => x.name);
}
async function loadGroupRules() {
  try {
    const r = await fetch('/api/config/group-rules');
    const j = await r.json();
    const rules = Array.isArray(j.rules) ? j.rules : [];
    const map = {};
    rules.forEach(it => {
      const n = it && it.name ? it.name : '';
      if (!n) return;
      map[n] = Array.isArray(it.matchers) ? it.matchers : [];
    });
    groupRulesMap = map;
    const list = getGroupTitles();
    const merged = (Array.isArray(list) ? list : []).map(g => {
      const ms = Array.isArray(map[g && g.name]) ? map[g.name] : (Array.isArray(g && g.matchers) ? g.matchers : []);
      return { name: g.name, color: g.color || '', matchers: ms };
    });
    localStorage.setItem('groupTitles', JSON.stringify(merged));
    appSettings.groupTitles = merged;
  } catch(e) {}
}
async function saveGroupRulesFromLocal() {
  const rules = getGroupRulesFromLocal();
  try { await fetch('/api/config/group-rules', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ rules }) }); } catch(e) {}
}
function setDebugVisible(v) {
  const w = document.getElementById('debugWrap');
  if (w) w.style.display = v ? '' : 'none';
  __debugVisible = v;
}
function dbg(msg, obj) {
  try { console.log('[RESULTS]', msg, obj !== undefined ? obj : ''); } catch(e) {}
  const pre = document.getElementById('debugPre');
  const st = document.getElementById('debugStatus');
  if (st) st.textContent = msg;
  if (!pre) return;
  const ts = new Date().toISOString().slice(11,19);
  let line = `[${ts}] ${msg}`;
  if (obj !== undefined) {
    try { line += ' ' + JSON.stringify(obj); } catch(e) {}
  }
  pre.textContent += line + '\n';
  pre.scrollTop = pre.scrollHeight;
}
function showCenterConfirm(msg, callback, isError) {
  let modal = document.getElementById('centerConfirmModal');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'centerConfirmModal';
    modal.innerHTML = `
    <div class="modal fade" tabindex="-1" style="display:block;background:rgba(0,0,0,0.5);z-index:10002;">
      <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0 shadow-lg" style="border-radius:12px;">
          <div class="modal-body text-center pt-4 pb-4">
            <div class="mb-3">
              <i class="bi bi-exclamation-circle text-warning display-4" id="centerConfirmIcon"></i>
            </div>
            <h5 class="fw-bold mb-3" id="centerConfirmText"></h5>
            <div class="d-flex justify-content-center gap-2 mt-4" id="centerConfirmBtns">
               <button class="btn btn-secondary btn-sm px-4" id="centerConfirmCancel">取消</button>
               <button class="btn btn-primary btn-sm px-4" id="centerConfirmOk">确定</button>
            </div>
          </div>
        </div>
      </div>
    </div>`;
    document.body.appendChild(modal);
  }
  const icon = document.getElementById('centerConfirmIcon');
  const txt = document.getElementById('centerConfirmText');
  const btns = document.getElementById('centerConfirmBtns');
  const btnOk = document.getElementById('centerConfirmOk');
  const btnCancel = document.getElementById('centerConfirmCancel');
  
  if (isError) {
    if (icon) icon.className = 'bi bi-x-circle text-danger display-4';
  } else {
    if (icon) icon.className = 'bi bi-exclamation-circle text-warning display-4';
  }
  
  if (txt) txt.textContent = msg || '';
  
  if (typeof callback === 'function') {
      if (btns) btns.style.display = 'flex';
      if (btnCancel) btnCancel.style.display = 'block';
      if (btnOk) {
        btnOk.textContent = '确定';
        btnOk.onclick = function() {
            modal.style.display = 'none';
            modal.querySelector('.modal').classList.remove('show');
            callback(true);
        };
      }
      if (btnCancel) {
        btnCancel.onclick = function() {
            modal.style.display = 'none';
            modal.querySelector('.modal').classList.remove('show');
            callback(false);
        };
      }
  } else {
      // Info mode (no cancel)
      if (btns) btns.style.display = 'flex';
      if (btnCancel) btnCancel.style.display = 'none';
      if (btnOk) {
        btnOk.textContent = '关闭';
        btnOk.onclick = function() {
            modal.style.display = 'none';
            modal.querySelector('.modal').classList.remove('show');
        };
      }
  }
  
  modal.style.display = 'block';
  modal.querySelector('.modal').classList.add('show');
}
function showCenterLinks(title, links) {
  let modal = document.getElementById('centerModalLinksR');
  if (!modal) {
    modal = document.createElement('div');
    modal.id = 'centerModalLinksR';
    modal.innerHTML = '<div class="modal fade" tabindex="-1" style="display:block;background:rgba(0,0,0,0.5);z-index:10001;"><div class="modal-dialog modal-dialog-centered modal-xl"><div class="modal-content border-0 shadow-lg" style="border-radius:12px;"><div class="modal-header border-bottom-0 pb-0"><h5 class="modal-title fw-bold text-dark" id="centerModalLinksTitleR"></h5><button type="button" class="btn-close" id="centerModalLinksCloseR"></button></div><div class="modal-body pt-2 pb-4 px-4"><div class="d-flex flex-wrap align-items-center justify-content-between gap-3 mb-4 bg-light p-3 rounded-3"><div class="text-secondary small d-flex align-items-center"><i class="bi bi-info-circle me-2 fs-5 text-primary"></i><span>生成播放器直连的接口链接，用户自行选择对应的相关配置后后可复制或打开链接；外网建议打开token验证，使用更加安全！</span></div><div class="d-flex flex-wrap align-items-center gap-3"><div class="d-flex align-items-center"><label for="centerLinksStatusSelect" class="text-muted small me-2 fw-bold">状态:</label><select class="form-select form-select-sm border-0 shadow-sm" id="centerLinksStatusSelect" style="min-width:140px;"><option value="all">全部频道</option><option value="online" selected>在线频道</option><option value="offline">离线频道</option></select></div><div class="d-flex align-items-center"><label for="centerLinksScopeSelect" class="text-muted small me-2 fw-bold">范围:</label><select class="form-select form-select-sm border-0 shadow-sm" id="centerLinksScopeSelect" style="min-width:120px;"><option value="internal" selected>内网</option><option value="external">外网</option></select></div><div class="d-flex align-items-center gap-2"><div class="form-check form-switch mb-0"><input class="form-check-input" type="checkbox" id="centerLinksTokenSwitch"><label class="form-check-label small text-muted fw-bold" for="centerLinksTokenSwitch">Token验证</label></div><div class="input-group input-group-sm shadow-sm" style="width:auto;"><input type="text" class="form-control border-0" id="centerLinksToken" placeholder="安全令牌" style="max-width: 120px;" title="仅外网链接生效"><button class="btn btn-outline-secondary bg-white" type="button" id="centerLinksTokenRand" title="生成随机Token"><i class="bi bi-shuffle"></i></button></div></div></div></div><div id="centerModalLinksBodyR" class="api-links-grid"></div></div></div></div></div>';
    document.body.appendChild(modal);
    document.getElementById('centerModalLinksCloseR').onclick = function(){ modal.style.display='none'; modal.querySelector('.modal').classList.remove('show'); };
    var ctrlRow = modal.querySelector('.modal-body .d-flex.flex-wrap.align-items-center.gap-3');
    if (ctrlRow && !document.getElementById('centerLinksFmtSelect')) {
      var protoBlock = document.createElement('div');
      protoBlock.className = 'd-flex align-items-center';
      protoBlock.innerHTML = '<label for="centerLinksProtoSelect" class="text-muted small me-2 fw-bold">协议:</label><select class="form-select form-select-sm border-0 shadow-sm" id="centerLinksProtoSelect" style="min-width:140px;"><option value="http" selected>HTTP 单播</option><option value="rtsp">RTSP 单播</option></select>';
      var fmtBlock = document.createElement('div');
      fmtBlock.className = 'd-flex align-items-center';
      fmtBlock.innerHTML = '<label for="centerLinksFmtSelect" class="text-muted small me-2 fw-bold">格式:</label><select class="form-select form-select-sm border-0 shadow-sm" id="centerLinksFmtSelect" style="min-width:220px;"><option value="default">无回看参数</option><option value="ku9" selected>酷9（UTC YYYYMMDD+HHmmss）</option><option value="mytv">mytv（{utc:yyyyMMddHHmmss}）</option><option value="playseek">playseek（YYYYMMDDHHmmss-YYYYMMDDHHmmss）</option><option value="startend14">starttime/endtime（YYYYMMDDHHmmss）</option><option value="beginend14">begin/end（YYYYMMDDHHmmss）</option><option value="iso8601">ISO8601（UTC，RFC3339）</option><option value="npt">NPT（HH:MM:SS-HH:MM:SS）</option><option value="rtsp_range">RTSP Range（使用 NPT 区间）</option><option value="unix_s">Unix 秒区间</option><option value="unix_ms">Unix 毫秒区间</option></select>';
      var scopeSelEl = modal.querySelector('#centerLinksScopeSelect');
      var scopeGroup = scopeSelEl ? scopeSelEl.closest('.d-flex.align-items-center') : null;
      function insertAfter(newNode, referenceNode) {
        if (!referenceNode || !referenceNode.parentNode) { ctrlRow.appendChild(newNode); return; }
        var parent = referenceNode.parentNode;
        if (referenceNode.nextSibling) parent.insertBefore(newNode, referenceNode.nextSibling);
        else parent.appendChild(newNode);
      }

let sortDir = 'asc';
function parseResolutionArea(r) {
  const m = String(r || '').toLowerCase().match(/(\d+)\s*x\s*(\d+)/);
  if (!m) return 0;
  const w = parseInt(m[1], 10) || 0;
  const h = parseInt(m[2], 10) || 0;
  return w * h;
}
function getSortValue(s, key) {
  if (key === 'resolution') return parseResolutionArea(s.resolution || '');
  if (key === 'frameRate') return typeof s.frameRate === 'number' ? s.frameRate : parseFloat(s.frameRate || '0') || 0;
  if (key === 'codec') return String(s.codec || '').toLowerCase();
  if (key === 'groupTitle') return String(s.groupTitle || '').toLowerCase();
  if (key === 'name') return String(s.name || '').toLowerCase();
  return 0;
}
function sortList(list) {
  const key = sortKey || 'resolution';
  const dir = sortKey ? (sortDir === 'desc' ? -1 : 1) : -1;

  return [...list].sort((a, b) => {
    // 1. 在线优先 (Online first)
    if (a.isAvailable !== b.isAvailable) {
      return a.isAvailable ? -1 : 1;
    }
    // 2. 排序键 (Sort key)
    const va = getSortValue(a, key);
    const vb = getSortValue(b, key);
    if (typeof va === 'number' && typeof vb === 'number') return (va - vb) * dir;
    return String(va).localeCompare(String(vb)) * dir;
  });
}

function openPotPlayer(url, title) {

    'potplayer://play?url=' + encodeURIComponent(url) + (title ? ('&title=' + encodeURIComponent(String(title))) : '')
  ];
  let opened = false;

}

    var target = '';

  }catch(e){}
}

    var s = streams[index];
    if(!s) return;
    var u = String(s.multicastUrl||'').trim();
    var scheme = u.split(':')[0].toLowerCase();
    var isMc = !!s.udpxyUrl || scheme==='rtp' || scheme==='udp';
    var base = (typeof displayUrlBase==='function') ? displayUrlBase(s) : u;
    if(isMc && s.httpParam){
      var hasQ = base.indexOf('?') > -1;
      if(base.indexOf(s.httpParam) === -1){
        base = base + (hasQ ? '&' : '?') + s.httpParam;
      }
    }
    var title = String(s.name||s.tvgName||'').trim();
    var tvgName = String(s.tvgName||s.name||'').trim();
    var logo = String(s.logo||'').trim();
    var qs = new URLSearchParams();
    qs.set('url', base);
    if(title) qs.set('title', title);
    if(tvgName) qs.set('tvgName', tvgName);
    if(logo) qs.set('logo', logo);
    qs.set('live','1');
  qs.set('ui','mini');
  var w = window.open('/player.html?'+qs.toString(), 'player_live', 'width=1200,height=720,menubar=no,toolbar=no,location=no,status=no,resizable=yes,scrollbars=no');
    if(w){ w.focus&&w.focus(); }
  }catch(e){}
}

           });
           
           // Highlight selection without destroying status style
           it.classList.add('shadow-sm', 'border-start', 'border-4', 'border-primary'); 
           
           // Set replaying status icon if not LIVE
           if (!isCurrent) {
               const iconEl = it.querySelector('.epg-status-icon');
               if (iconEl) {
                   iconEl.innerHTML = '<div class="d-flex align-items-center text-success"><span class="badge bg-success me-2">正在回看</span><i class="bi bi-play-circle-fill fs-5"></i></div>';

           } else {

           const cpEl = document.getElementById('epgCurrentProgramR');
           const rpEl = document.getElementById('epgReplayProgramR');
           if (isCurrent) {
               if (rpEl) { rpEl.style.display = 'none'; rpEl.textContent = ''; }

               }
               playState.mode = 'live';
               playState.title = p.title || '无标题';
               // Live rules: multicast -> 地址+FCC 用 mpegts；unicast -> 原地址用 hls
               function isMulticast(obj){ var u=String(obj.multicastUrl||'').trim(); var sch=u.split(':')[0].toLowerCase(); return !!obj.udpxyUrl||sch==='rtp'||sch==='udp'; }
               function ensureHttpMulticastUrl(obj){
                 var u=String(obj.multicastUrl||'').trim(); var addr=u.replace(/^(rtp|udp):\/\//i,'');
                 if(obj.udpxyUrl && /^https?:\/\//i.test(obj.udpxyUrl)){ return obj.udpxyUrl.replace(/\/+$/,'') + '/rtp/' + addr; }
                 if(typeof displayUrlBase==='function'){ try{ var dv=String(displayUrlBase(obj)||'').trim(); if(/^https?:\/\//i.test(dv)){ return dv; } }catch(e){} }
                 try{ var list=JSON.parse(localStorage.getItem('udpxyServers')||'[]'); var currId=localStorage.getItem('udpxyCurrentId')||''; var item=list.find(x=>x.id===currId); var url=item?(item.url||''):''; if(!url){ url=(window.appSettings&&(appSettings.udpxyCurrentUrl||appSettings.internalUrl))||''; } if(url && /^https?:\/\//i.test(url)){ return url.replace(/\/+$/,'') + '/rtp/' + addr; } }catch(e){}
                 return u;
               }
               function buildLiveRawFor(obj){
                 var base=isMulticast(obj)?ensureHttpMulticastUrl(obj):String(obj.multicastUrl||'').trim();
                 if(isMulticast(obj) && obj.httpParam){ var hasQ=base.indexOf('?')>-1; if(base.indexOf(obj.httpParam)===-1){ base=base+(hasQ?'&':'?')+obj.httpParam; } }
                 return base;
               }
               (function(){
                 var raw=buildLiveRawFor(s);
                 if(!raw) return;
                 var mcast=isMulticast(s);
                 var v=document.getElementById('epgPlayerR'); var urlEl=document.getElementById('epgPlayUrlR'); var openEl=document.getElementById('epgOpenR');
                 function ensureMpegts(cb){ if(window.mpegts){ cb(); return; } var sc=document.createElement('script'); sc.src='https://cdn.jsdelivr.net/npm/mpegts.js@1.8.0/dist/mpegts.js'; sc.onload=function(){ cb(); }; document.head.appendChild(sc); }

                   var playUrl='/api/proxy/stream?url='+encodeURIComponent(raw);

                       v._mts=p; p.attachMediaElement(v); p.load(); p.play();
                     }else{ v.src=playUrl; v.play().catch(()=>{}); }
                   });
                 }else{
                   var isM3u8=/\.m3u8(\?|$)/i.test(raw)||raw.includes('m3u8');

                   if(openEl) openEl.href=playUrl; if(urlEl) urlEl.value=raw;
                   ensureHls(function(){
                     if(isM3u8 && window.Hls && Hls.isSupported()){
                       try{ if(v._hls&&typeof v._hls.destroy==='function'){ v._hls.destroy(); } }catch(e){}

                     }else{
                       try{ if(v._hls&&typeof v._hls.destroy==='function'){ v._hls.destroy(); v._hls=null; } }catch(e){}
                       v.src=playUrl; v.play().catch(()=>{});
                     }
                   });
                 }
               })();
           } else {
               if(cpEl) cpEl.style.display = 'none';
               if(rpEl) {
                   var sd = new Date(p.startMs);
                   var ed = new Date(p.endMs);
                   var pf = function(n){ return String(n).padStart(2,'0'); };
                   var ds = sd.getFullYear() + '-' + pf(sd.getMonth()+1) + '-' + pf(sd.getDate());
                   var ts = ds + ' ' + pf(sd.getHours()) + ':' + pf(sd.getMinutes()) + '-' + pf(ed.getHours()) + ':' + pf(ed.getMinutes());

  function doPlay(p){
    var qs=new URLSearchParams();
    qs.set('scope', getScope());
    var fmtSel=document.getElementById('epgFmtR'); var fmt=fmtSel?(fmtSel.value||'iso8601'):'iso8601';
    var protoSel=document.getElementById('epgProtoR'); var proto=protoSel?(protoSel.value||'http'):'http';
    qs.set('fmt', fmt); qs.set('proto', proto);
    qs.set('name', s.name||s.tvgName||s.tvgId||''); qs.set('tvgName', s.tvgName||'');
    qs.set('resolution', s.resolution||''); qs.set('frameRate', s.frameRate||'');
    qs.set('multicastUrl', s.multicastUrl||''); qs.set('catchupBase', s.catchupBase||'');
    qs.set('startMs', p.startMs); qs.set('endMs', p.endMs);
    fetch('/api/catchup/play?'+qs.toString()).then(r=>r.json()).then(x=>{
      var urlEl=document.getElementById('epgPlayUrlR'); var openEl=document.getElementById('epgOpenR'); var v=document.getElementById('epgPlayerR');
      if (x && x.success && x.url){
        var raw=x.url;
        var isM3u8=/\.m3u8(\?|$)/i.test(raw)||raw.includes('m3u8');
        var playUrl=isM3u8?('/api/proxy/hls?url='+encodeURIComponent(raw)):('/api/proxy/stream?url='+encodeURIComponent(raw));
        urlEl.value=raw; openEl.href=playUrl;
        // 强制切换到回看前清理 mpegts 与 hls 实例
        try{ 
          if(v._mts){ 
            try{ v._mts.pause&&v._mts.pause(); }catch(e){}
            try{ v._mts.unload&&v._mts.unload(); }catch(e){}
            try{ v._mts.detachMediaElement&&v._mts.detachMediaElement(); }catch(e){}
            try{ v._mts.destroy&&v._mts.destroy(); }catch(e){}
            v._mts=null; 
          } 
        }catch(e){}
        try{ if(v._hls && typeof v._hls.destroy==='function'){ v._hls.destroy(); v._hls=null; } }catch(e){}
        try{ v.pause(); v.removeAttribute('src'); v.load(); }catch(e){}
        if(isM3u8){
          // 确保按需加载 hls.js 再播放
          ensureHls(function(){
            if(window.Hls && Hls.isSupported()){
              try{ if(v._hls && typeof v._hls.destroy==='function'){ v._hls.destroy(); } }catch(e){}
              var h=new Hls(); v._hls=h; h.loadSource(playUrl); h.attachMedia(v); v.play().catch(()=>{});
            }else{
              // 回退原生
              try{ if(v._hls && typeof v._hls.destroy==='function'){ v._hls.destroy(); v._hls=null; } }catch(e){}
              v.src=playUrl; v.play().catch(()=>{});
            }
          });
        } else {
          // 非 m3u8 回放（兼容性回退）
          try{ if(v._hls && typeof v._hls.destroy==='function'){ v._hls.destroy(); v._hls=null; } }catch(e){}
          v.src=playUrl; v.play().catch(()=>{});
        }
      }
    });
  }
  loadList();
}

    if (thFps) thFps.onclick = function(){ sortKey = 'frameRate'; sortDir = sortKey === 'frameRate' && sortDir === 'asc' ? 'desc' : (sortKey === 'frameRate' && sortDir === 'desc' ? 'asc' : 'asc'); updateSortIndicators(); renderTable(); };

    const delFccBtn = document.getElementById('delFccBtn');

    const logoSel = document.getElementById('logoTplSelect');

    if (logoAdd) logoAdd.onclick = function() {
      const name = logoNameInput ? (logoNameInput.value || '').trim() : '';

      const list = getLogoTpls();

      list.push({ id, name: name || '未命名模板', url });

      const sel = document.getElementById('logoTplSelect');

        sel.innerHTML = '';

      }
      const urls = list.map(x => x.url).filter(Boolean);
      setLogoTemplate(url, urls).then(() => loadLogoTemplates());
    };
    const logoDel = document.getElementById('delLogoTplBtn');
    if (logoDel) logoDel.onclick = function() {
      const sel = document.getElementById('logoTplSelect');
      const curr = sel ? sel.value : '';
      if (!curr) return;
      let list = getLogoTpls();
      const idx = list.findIndex(x => x.id === curr);
      if (idx >= 0) list.splice(idx, 1);
      saveLogoTpls(list);
      const next = list[0] || null;
      if (sel) {
        sel.innerHTML = '';
        list.forEach(t => { const opt = document.createElement('option'); opt.value = t.id; opt.text = t.name + ' (' + t.url + ')'; sel.appendChild(opt); });
        sel.value = next ? next.id : '';
      }
      if (logoNameInput) logoNameInput.value = '';
      if (logoAddrInput) logoAddrInput.value = '';
      setCurrentLogoTplId(next ? next.id : '');
      const urls = list.map(x => x.url).filter(Boolean);
      setLogoTemplate(next ? next.url : '', urls).then(() => loadLogoTemplates());
    };
    const logoSync = document.getElementById('syncLogoTplBtn');
    if (logoSync) logoSync.onclick = async function() {
      const list = getLogoTpls();
      const currId = getCurrentLogoTplId();
      const item = list.find(x => x.id === currId) || list[0];
      const currUrl = item ? item.url : '';
      const urls = list.map(x => x.url).filter(Boolean);
      await setLogoTemplate(currUrl, urls);
      await batchLogo();
    };
    const syncFccBtn2 = document.getElementById('syncFccBtn');
    if (syncFccBtn2) syncFccBtn2.onclick = async function(){
      const list = getFccServers();
      const curr = getCurrentFccId();
      const item = list.find(x => x.id === curr);
      const v = item ? item.addr : (fccAddrInput.value || '');
      if (!v) return;
      const payload = { fcc: v };
      const r = await fetch('/api/set-fcc', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
      const j = await r.json();
      if (j.success) await fetchStreams();
    };
    try {
      const rs = await fetch('/api/settings');
      const sj = await rs.json();
      if (sj.success && sj.settings) {
        appSettings = sj.settings;
        if (Array.isArray(appSettings.groupTitles)) { const merged = mergeGroupTitlesPreserveMatchers(appSettings.groupTitles); localStorage.setItem('groupTitles', JSON.stringify(merged)); }
        if (typeof appSettings.logoTemplate === 'string') localStorage.setItem('logoTemplate', appSettings.logoTemplate);
        if (Array.isArray(appSettings.fccServers)) localStorage.setItem('fccServers', JSON.stringify(appSettings.fccServers));
        
        // Initialize switch state from settings
        const useExt = !!appSettings.useExternal;
        const sw = document.getElementById('netScopeSwitchR2');
        if (sw) {
            sw.checked = useExt;
            updateNetScopeUI(useExt);
        }
        // Initialize radio buttons from settings
        const radioInt = document.getElementById('netScopeInternal');
        const radioExt = document.getElementById('netScopeExternal');
        if (radioInt && radioExt) {
            if (useExt) radioExt.checked = true;
            else radioInt.checked = true;
        }
      }
    } catch(e) {}
    try {
      const rf = await fetch('/api/config/fcc-servers');
      const jf = await rf.json();
      if (jf.success && Array.isArray(jf.servers) && jf.servers.length > 0) {
        localStorage.setItem('fccServers', JSON.stringify(jf.servers));
        if (jf.currentId) localStorage.setItem('currentFccId', jf.currentId);
        renderFccSelect();
      }
    } catch(e) {}
    await loadLogoTemplates();
    await refreshVersions(getCurrentVersionFile(), true);
  } catch(e) {
    dbg('__initResults error', { message: String(e) });
  } finally {
    dbg('__initResults done');
    window.__resultsInitDone = true;
    await fetchStreams();
    try {
      const r1 = await fetch('/api/streams'); dbg('diag:/api/streams status', { ok: r1.ok, status: r1.status });
    } catch(e) { dbg('diag:/api/streams error', { message: String(e) }); }
    try {
      const r2 = await fetch('/api/persist/list'); dbg('diag:/api/persist/list status', { ok: r2.ok, status: r2.status });
    } catch(e) { dbg('diag:/api/persist/list error', { message: String(e) }); }
    try {
      const r3 = await fetch('/api/settings'); dbg('diag:/api/settings status', { ok: r3.ok, status: r3.status });
    } catch(e) { dbg('diag:/api/settings error', { message: String(e) }); }
  }
}
fetchStreams();
requestAnimationFrame(() => { try { __initResults(); } catch(e) {} });
window.addEventListener('DOMContentLoaded', () => { __initResults(); });
setTimeout(() => { if (!window.__resultsInitDone) { __initResults(); } }, 800);
</script>

    <script>
        let isDockerEnv = false;
        
        // 加载版本信息
        async function loadSystemInfo() {
            try {
                const r = await fetch('/api/system/info');
                const j = await r.json();
                if (j.success) {
                    document.getElementById('footerVersion').textContent = 'v' + j.version;
                    document.getElementById('modalCurrentVersion').textContent = 'v' + j.version;
                    if (j.isDocker) {
                        isDockerEnv = true;
                        document.getElementById('dockerBadge').style.display = 'inline-block';
                    }
                }
            } catch(e) {}
        }
        
        // 显示弹窗并检查更新
        async function showVersionModal() {
            const modal = new bootstrap.Modal(document.getElementById('versionModal'));
            modal.show();
            await checkGithubUpdate();
        }
        
        async function checkGithubUpdate() {
            const notesDiv = document.getElementById('releaseNotes');
            const latestSpan = document.getElementById('modalLatestVersion');
            const btnUpdate = document.getElementById('btnUpdate');
            
            async function fetchWithTimeout(url, opts) {
                const controller = new AbortController();
                const id = setTimeout(() => controller.abort(), (opts && opts.timeout) || 6000);
                try {
                    const r = await fetch(url, { ...(opts||{}), signal: controller.signal, headers: { 'Accept': 'application/vnd.github+json' } });
                    clearTimeout(id);
                    if (r.ok) return await r.json();
                    throw new Error('HTTP ' + r.status);
                } finally {
                    clearTimeout(id);
                }
            }
            
            // 多 CDN/镜像顺序尝试（优先使用 gh-proxy 系列）
            const endpoints = [
                'https://gh-proxy.com/https://api.github.com/repos/cgg888/iptv-checker/releases/latest',
                'https://api.github.com/repos/cgg888/iptv-checker/releases/latest',
                'https://mirror.ghproxy.com/https://api.github.com/repos/cgg888/iptv-checker/releases/latest',
                'https://ghapi.hacxy.workers.dev/repos/cgg888/iptv-checker/releases/latest'
            ];
            
            let data = null, err = null;
            for (const u of endpoints) {
                try {
                    data = await fetchWithTimeout(u, { timeout: 6000 });
                    if (data && data.tag_name) break;
                } catch(e) { err = e; }
            }
            
            if (data && data.tag_name) {
                latestSpan.textContent = data.tag_name;
                notesDiv.innerHTML = (data.body || '').replace(/\r\n/g, '<br>').replace(/\n/g, '<br>');
                
                const currentVer = document.getElementById('modalCurrentVersion').textContent.replace('v', '').trim();
                const remoteVer = data.tag_name.replace('v', '').trim();
                
                if (remoteVer !== currentVer) {
                    btnUpdate.textContent = isDockerEnv ? 'Docker 更新指引' : '立即更新';
                    btnUpdate.disabled = false;
                    btnUpdate.classList.remove('btn-secondary');
                    btnUpdate.classList.add('btn-success');
                } else {
                    btnUpdate.textContent = '已是最新版本';
                    btnUpdate.disabled = true;
                    btnUpdate.classList.remove('btn-success');
                    btnUpdate.classList.add('btn-secondary');
                }
            } else {
                latestSpan.textContent = '获取失败';
                notesDiv.textContent = '无法通过 GitHub CDN 获取最新版本';
            }
        }
        
        async function doUpdate() {
            if (isDockerEnv) {
                alert('Docker 环境无法直接通过网页更新。\n\n请在服务器执行以下命令更新：\ndocker-compose pull && docker-compose up -d');
                return;
            }
            
            if (!confirm('确定要尝试自动更新吗？\n请确保已保存数据。')) return;
            
            const btn = document.getElementById('btnUpdate');
            btn.disabled = true;
            btn.textContent = '更新中...';
            
            try {
                const r = await fetch('/api/system/update', { method: 'POST' });
                const j = await r.json();
                alert(j.message);
                if (j.success) {
                    location.reload();
                }
            } catch(e) {
                alert('请求失败');
            } finally {
                btn.disabled = false;
                btn.textContent = '立即更新';
            }
        }
        
        document.addEventListener('DOMContentLoaded', loadSystemInfo);

        async function doLogout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login.html';
        }
        async function doChangePwd() {
            const username = document.getElementById('newUsername').value;
            const oldPassword = document.getElementById('oldPassword').value;
            const password = document.getElementById('newPassword').value;
            if (!oldPassword) {
                alert('请输入旧密码');
                return;
            }
            try {
                const r = await fetch('/api/auth/update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, oldPassword, password })
                });
                const j = await r.json();
                if (j.success) {
                    alert('修改成功');
                    const modalEl = document.getElementById('changePwdModal');
                    const modalInstance = bootstrap.Modal.getInstance(modalEl);
                    if (modalInstance) modalInstance.hide();
                    document.getElementById('changePwdForm').reset();
                    if (j.username) document.getElementById('userDisplay').textContent = j.username;
                } else {
                    alert(j.message || '修改失败');
                }
            } catch(e) {
                alert('网络错误');
            }
        }
    </script>

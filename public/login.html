<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Checker - 登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .login-header i {
            font-size: 3.5rem;
            color: #6f42c1; /* Brand color match */
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(111, 66, 193, 0.2));
        }
        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.1);
            border-color: #6f42c1;
        }
        .btn-primary {
            background-color: #6f42c1;
            border-color: #6f42c1;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #5e37a6;
            border-color: #5e37a6;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background-color: #6f42c1;
            border-color: #6f42c1;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <i class="bi bi-tv-fill"></i>
            <h1>IPTV Checker</h1>
            <p class="text-muted mb-0">组播单播批量检测工具</p>
            <p class="text-muted mb-0">安全登录</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary small fw-bold">用户名</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-secondary small fw-bold">密码</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-key text-muted"></i></span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="captcha" class="form-label text-secondary small fw-bold">验证码</label>
                <div class="d-flex gap-2">
                    <input type="text" class="form-control" id="captcha" name="captcha" required placeholder="请输入验证码" autocomplete="off">
                    <div style="cursor:pointer;" onclick="refreshCaptcha()" title="点击刷新验证码">
                        <img id="captchaImg" src="/api/captcha" alt="验证码" style="height:38px;border-radius:4px;border:1px solid #dee2e6;">
                    </div>
                </div>
            </div>
            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary shadow-sm">立即登录</button>
            </div>
            <div class="text-center text-muted small" style="font-size: 0.8rem;">
                默认账号/密码: <span class="fw-bold text-dark">admin</span> / <span class="fw-bold text-dark">admin</span>
                <p class="text-muted mb-0">外网使用请修改默认账号密码</p>
            </div>
            <div id="errorMsg" class="alert alert-danger mt-3 d-none border-0 bg-danger bg-opacity-10 text-danger small" role="alert"></div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function refreshCaptcha() {
            document.getElementById('captchaImg').src = '/api/captcha?t=' + Date.now();
            document.getElementById('captcha').value = '';
        }

        // 检查是否已经登录
        fetch('/api/auth/check').then(r => r.json()).then(j => {
            if (j.success) window.location.href = '/';
        }).catch(() => {});

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登录中...';
            errorDiv.classList.add('d-none');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, captcha })
                });
                const data = await res.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    errorDiv.textContent = data.message || '登录失败';
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = '立即登录';
                    refreshCaptcha(); // 失败刷新验证码
                }
            } catch (err) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = '立即登录';
                refreshCaptcha();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPTV Checker - 登录</title>
    <link rel="icon" type="image/png" href="/iptv.png">
    <script>
        try {
            const k = localStorage.getItem('iptv:theme');
            const t = k || (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            document.documentElement.setAttribute('data-theme', t === 'dark' ? 'dark' : 'light');
        } catch (e) {}
        try {
            if (window.top && window.top !== window.self) {
                window.top.location.replace(window.location.href);
            }
        } catch (e) {}
    </script>
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            min-height: 100dvh;
            background: #0f172a !important;
            overflow: hidden;
        }
        body {
            position: fixed;
            inset: 0;
        }
    </style>
    <link href="/vendor/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="/vendor/bootstrap-icons/1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="css/theme-tokens.css" rel="stylesheet">
    <link href="css/shadcn-ui.css" rel="stylesheet">
    <style>
        html, body {
            background: #0f172a !important;
            min-height: 100dvh;
        }
        body {
            background: var(--login-fallback-bg, #0f172a) !important;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            position: fixed;
            inset: 0;
            overflow: hidden;
        }
        .bg-bing {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(140deg, #6f42c1 0%, #4f46e5 45%, #0f172a 100%);
        }
        .bg-bing::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
        }
        .theme-login-toggle {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 20;
        }
        .bg-bing img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            opacity: 0;
            transition: opacity .35s ease;
        }
        .bg-bing.ready img {
            opacity: 1;
        }
        .bg-bing.loading img {
            opacity: 0;
        }
        .login-card {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .login-logo {
            width: 56px;
            height: 56px;
            object-fit: contain;
            margin-bottom: 1rem;
            filter: drop-shadow(0 4px 6px rgba(111, 66, 193, 0.2));
        }
        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header h1 {
            font-size: 1.75rem;
            margin-bottom: 0.5rem;
            color: #18181b;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .login-header i {
            font-size: 3.5rem;
            color: #6f42c1; /* Brand color match */
            margin-bottom: 1rem;
            display: inline-block;
            filter: drop-shadow(0 4px 6px rgba(111, 66, 193, 0.2));
        }
        .input-icon {
            width: 16px;
            height: 16px;
            object-fit: contain;
            opacity: 0.75;
        }
        .form-control {
            border-radius: 8px;
            padding: 0.75rem 1rem;
            border: 1px solid #dee2e6;
            background-color: #f8f9fa;
        }
        .form-control:focus {
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(111, 66, 193, 0.1);
            border-color: #6f42c1;
        }
        .btn-primary {
            background-color: #6f42c1;
            border-color: #6f42c1;
            padding: 0.75rem;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background-color: #5e37a6;
            border-color: #5e37a6;
            transform: translateY(-1px);
        }
        .btn-primary:disabled {
            background-color: #6f42c1;
            border-color: #6f42c1;
            opacity: 0.7;
        }
        .theme-login-toggle {
            border: 1px solid rgba(255, 255, 255, 0.45) !important;
            background: rgba(255, 255, 255, 0.28) !important;
            backdrop-filter: blur(8px);
            color: #ffffff !important;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.22);
            min-width: 92px;
        }
        .theme-login-toggle:hover {
            background: rgba(255, 255, 255, 0.4) !important;
        }
        :root[data-theme="light"] .login-card {
            background: rgba(255, 255, 255, 0.92) !important;
            border: 1px solid rgba(255, 255, 255, 0.45) !important;
        }
        :root[data-theme="light"] body {
            --login-fallback-bg: #edf2ff;
        }
        :root[data-theme="light"] .bg-bing {
            background: linear-gradient(145deg, #b69cf0 0%, #8ab4ff 48%, #d7e3ff 100%);
        }
        :root[data-theme="dark"] .bg-bing::after {
            background: rgba(0, 0, 0, 0.5);
        }
        :root[data-theme="dark"] body {
            --login-fallback-bg: #020617;
        }
        :root[data-theme="dark"] .bg-bing {
            background: linear-gradient(145deg, #121a3a 0%, #1c2a5c 45%, #020617 100%);
        }
        :root[data-theme="dark"] .login-card {
            background: rgba(12, 16, 24, 0.78) !important;
            border: 1px solid rgba(148, 163, 184, 0.2) !important;
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.48);
            backdrop-filter: blur(14px);
        }
        :root[data-theme="dark"] .login-header h1 {
            color: #f4f4f5;
        }
        :root[data-theme="dark"] .login-header .text-muted {
            color: #cbd5e1 !important;
        }
        :root[data-theme="dark"] .form-label {
            color: #f1f5f9 !important;
        }
        :root[data-theme="dark"] .input-icon {
            opacity: 0.95;
        }
        :root[data-theme="dark"] .theme-login-toggle {
            border: 1px solid rgba(148, 163, 184, 0.45) !important;
            background: rgba(15, 23, 42, 0.45) !important;
            color: #e2e8f0 !important;
        }
        :root[data-theme="dark"] .theme-login-toggle:hover {
            background: rgba(15, 23, 42, 0.62) !important;
        }
        @media (max-width: 576px) {
            .theme-login-toggle {
                top: 12px;
                right: 12px;
                min-width: 84px;
            }
            .login-card {
                padding: 1.5rem;
            }
            .login-header {
                margin-bottom: 1.4rem;
            }
            .login-header h1 {
                font-size: 1.45rem;
            }
        }
    </style>
</head>
<body>
    <button class="btn btn-sm btn-outline-secondary theme-toggle-btn theme-login-toggle" id="themeToggleBtnLogin" type="button" data-theme-toggle></button>
    <div class="bg-bing">
        <img id="loginBgImg" src="" alt="随机获取Bing历史壁纸UHD超高清原图" referrerpolicy="no-referrer" loading="eager" decoding="async">
    </div>
    <div class="login-card">
        <div class="login-header">
            <img src="/iptv.png" alt="IPTV Checker" class="login-logo">
            <h1>IPTV Checker</h1>
            <p class="text-muted mb-0">组播单播批量检测工具</p>
            <p class="text-muted mb-0">安全登录</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="username" class="form-label text-secondary small fw-bold">用户名</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <img src="/iptv.png" alt="" class="input-icon">
                    </span>
                    <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" required autofocus>
                </div>
            </div>
            <div class="mb-4">
                <label for="password" class="form-label text-secondary small fw-bold">密码</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0">
                        <img src="/iptv.png" alt="" class="input-icon">
                    </span>
                    <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="captcha" class="form-label text-secondary small fw-bold">验证码</label>
                <div class="d-flex gap-2">
                    <input type="text" class="form-control" id="captcha" name="captcha" required placeholder="请输入验证码" autocomplete="off">
                    <div style="cursor:pointer;" onclick="refreshCaptcha()" title="点击刷新验证码">
                        <img id="captchaImg" src="/api/captcha" alt="验证码" style="height:38px;border-radius:4px;border:1px solid #dee2e6;">
                    </div>
                </div>
            </div>
            <div class="d-grid gap-2 mb-3">
                <button type="submit" class="btn btn-primary shadow-sm">立即登录</button>
            </div>
            <div class="text-center text-muted small" style="font-size: 0.8rem;">
                默认账号/密码: <span class="fw-bold text-dark">admin</span> / <span class="fw-bold text-dark">admin</span>
                <p class="text-muted mb-0">外网使用请修改默认账号密码</p>
                <div class="text-muted mt-1">版本号：<span id="loginVersion">-</span></div>
            </div>
            <div id="errorMsg" class="alert alert-danger mt-3 d-none border-0 bg-danger bg-opacity-10 text-danger small" role="alert"></div>
        </form>
    </div>

    <script src="/vendor/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script src="/js/core/api-client.js"></script>
    <script src="/js/theme-manager.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            if (window.IptvTheme) window.IptvTheme.initAll();
        });
    </script>
    <script>
        async function apiJson(url, options) {
            if (window.IptvCore && window.IptvCore.api && typeof window.IptvCore.api.request === 'function') {
                const resp = await window.IptvCore.api.request(url, options || {});
                return resp && resp.data ? resp.data : {};
            }
            const r = await fetch(url, options || {});
            return await r.json();
        }
        function loadSystemInfoLogin(){
            apiJson('/api/system/info').then(j=>{
                if(j&&j.success&&j.version){
                    var el=document.getElementById('loginVersion');
                    if(el) el.textContent='v'+j.version;
                }
            }).catch(()=>{});
        }
        document.addEventListener('DOMContentLoaded', loadSystemInfoLogin);
        function initLoginWallpaper() {
            const img = document.getElementById('loginBgImg');
            const wrap = document.querySelector('.bg-bing');
            if (!img || !wrap) return;
            const remoteSources = [
                'https://bing.img.run/rand_uhd.php?t=' + Date.now(),
                'https://cn.bing.com/HPImageArchive.aspx?format=js&idx=0&n=1&mkt=zh-CN'
            ];
            wrap.classList.add('loading');
            img.onload = function() {
                wrap.classList.remove('loading');
                wrap.classList.add('ready');
            };
            img.onerror = function() {
                wrap.classList.remove('loading');
            };
            const loadRemote = function(url, timeoutMs) {
                return new Promise((resolve, reject) => {
                    const tmp = new Image();
                    const timer = setTimeout(() => reject(new Error('timeout')), timeoutMs || 5000);
                    tmp.onload = function() {
                        clearTimeout(timer);
                        resolve(url);
                    };
                    tmp.onerror = function() {
                        clearTimeout(timer);
                        reject(new Error('error'));
                    };
                    tmp.referrerPolicy = 'no-referrer';
                    tmp.src = url;
                });
            };
            const fetchBingJsonImage = async function(url) {
                try {
                    const j = await apiJson(url, { cache: 'no-store' });
                    const item = j && Array.isArray(j.images) && j.images[0] ? j.images[0] : null;
                    if (!item || !item.url) return '';
                    const full = item.url.startsWith('http') ? item.url : ('https://cn.bing.com' + item.url);
                    return full;
                } catch (e) {
                    return '';
                }
            };
            const canLoadRemote = (function() {
                try {
                    const c = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
                    if (!c) return true;
                    if (c.saveData) return false;
                    const et = String(c.effectiveType || '').toLowerCase();
                    if (et === 'slow-2g' || et === '2g') return false;
                    return true;
                } catch (e) {
                    return true;
                }
            })();
            if (!canLoadRemote) {
                wrap.classList.remove('loading');
                return;
            }
            setTimeout(async function() {
                try {
                    const direct = await loadRemote(remoteSources[0], 6000);
                    img.src = direct;
                    return;
                } catch (e) {}
                const jsonUrl = await fetchBingJsonImage(remoteSources[1]);
                if (!jsonUrl) return;
                try {
                    const verified = await loadRemote(jsonUrl, 6000);
                    img.src = verified;
                } catch (e) {}
            }, 1200);
        }
        document.addEventListener('DOMContentLoaded', initLoginWallpaper);
        function refreshCaptcha() {
            document.getElementById('captchaImg').src = '/api/captcha?t=' + Date.now();
            document.getElementById('captcha').value = '';
        }

        function getRedirect(){
            try{
                const p=new URLSearchParams(location.search);
                let r=p.get('redirect')||'/';
                if(/^https?:/i.test(r)){
                    try{ const u=new URL(r, location.origin); if(u.origin!==location.origin) return '/'; return u.pathname+u.search+u.hash; }catch(e){ return '/'; }
                }
                return r.startsWith('/')?r:'/';
            }catch(e){ return '/'; }
        }
        // 检查是否已经登录
        apiJson('/api/auth/check').then(j => {
            if (j.success) window.location.href = getRedirect();
        }).catch(() => {});

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = this.querySelector('button[type="submit"]');
            const errorDiv = document.getElementById('errorMsg');
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const captcha = document.getElementById('captcha').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>登录中...';
            errorDiv.classList.add('d-none');

            try {
                const data = await apiJson('/api/login', {
                    method: 'POST',
                    body: { username, password, captcha }
                });
                
                if (data.success) {
                    window.location.href = getRedirect();
                } else {
                    errorDiv.textContent = data.message || '登录失败';
                    errorDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.textContent = '立即登录';
                    refreshCaptcha(); // 失败刷新验证码
                }
            } catch (err) {
                errorDiv.textContent = '网络错误，请稍后重试';
                errorDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.textContent = '立即登录';
                refreshCaptcha();
            }
        });
    </script>
</body>
</html>

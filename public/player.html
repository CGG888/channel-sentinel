<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>IPTV Checker-播放器</title>
  <link rel="icon" type="image/png" href="/iptv.png">
  <link href="/vendor/bootstrap/5.3.3/css/bootstrap.min.css" rel="stylesheet">
  <link href="/vendor/bootstrap-icons/1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    html,body{
      margin:0;
      padding:0;
      width:100%;
      height:100%;
      background:#000;
      color:#fff;
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,"Noto Sans",sans-serif;
    }
    :root{--bg:#0b0d12;--card:#141922;--muted:#8a93a5}
    body{
      margin:0;
      padding:0;
      overflow:hidden;
      background:#000;
      color:#fff;
      display:flex;
      height:100vh;
    }
    .muted{color:var(--muted)}
    #playerLayer{
      position:relative;
      flex:1;
      min-width:0;
      height:100vh;
      z-index:0;
      background:#000;
    }
    #app{width:100%;height:100%}
    #channelLayer{
      position:relative;
      width:380px;
      max-width:420px;
      height:100vh;
      z-index:5;
      background:#f9fafb;
      display:flex;
      flex-direction:column;
      border-left:1px solid #e5e7eb;
    }
    #channelLayer.collapsed{
      width:0;
      opacity:0;
      pointer-events:none;
    }
    .channel-header{
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid #e5e7eb;
      background:#ffffff;
      gap:8px;
    }
    .channel-header-title{
      font-weight:600;
      font-size:15px;
      color:#111827;
    }
    .channel-actions{
      display:flex;
      align-items:center;
      gap:8px;
    }
    .channel-theme-btn{
      border:none;
      background:#e5e7eb;
      color:#111827;
      border-radius:999px;
      font-size:12px;
      padding:4px 10px;
      cursor:pointer;
    }
    .channel-theme-btn:active{
      transform:scale(0.96);
    }
    .channel-close-btn{
      border:none;
      background:transparent;
      color:#6b7280;
      font-size:18px;
      cursor:pointer;
      padding:0 4px;
    }
    .channel-close-btn:hover{
      color:#111827;
    }
    .channel-search-wrap{
      padding:8px 16px 4px;
      background:#ffffff;
      border-bottom:1px solid #e5e7eb;
    }
    .channel-search-input{
      width:100%;
      border-radius:999px;
      border:1px solid #e5e7eb;
      padding:6px 12px;
      font-size:14px;
      outline:none;
      background:#f3f4f6;
      color:#111827;
    }
    .channel-search-input::placeholder{
      color:#9ca3af;
    }
    .channel-tabs-wrap{
      padding:4px 12px 8px;
      background:#ffffff;
      border-bottom:1px solid #e5e7eb;
    }
    #catTabs{
      gap:6px;
    }
    #catTabs .nav-link{
      border-radius:999px;
      padding:4px 10px;
      font-size:13px;
      color:#4b5563;
      background:transparent;
    }
    #catTabs .nav-link.active{
      background:#2563eb;
      color:#ffffff;
    }
    .channel-list-scroll{
      flex:1;
      overflow-y:auto;
      padding:8px 10px 12px;
    }
    .channel-item{
      margin:4px 4px;
      border-radius:14px;
      background:#ffffff;
      box-shadow:0 1px 3px rgba(15,23,42,0.08);
      padding:8px 10px;
      color:#111827;
      cursor:pointer;
      transition:background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .channel-item.active{
      background:#eef2ff;
      border-left:0;
      box-shadow:0 0 0 1px rgba(37,99,235,0.25);
      transform:translateY(-1px);
    }
    .channel-item:hover{
      background:#f3f4ff;
      box-shadow:0 4px 10px rgba(15,23,42,0.12);
      transform:translateY(-2px);
    }
    .channel-title{
      font-size:14px;
      font-weight:600;
      color:#111827;
    }
    .channel-title-text{
      flex:1;
      min-width:0;
    }
    .channel-replay-icon{
      font-size:14px;
      color:#f97316;
    }
    .channel-sub{
      color:#6b7280;
    }
    .channel-count-badge{
      border-radius:999px;
      background:#e5edff;
      color:#1d4ed8;
      font-size:12px;
    }
    .channel-index-badge{
      width:26px;
      height:26px;
      border-radius:999px;
      background:#eef2ff;
      color:#2563eb;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:13px;
      font-weight:600;
      flex-shrink:0;
    }
    .channel-logo-right{
      width:72px;
      height:40px;
      flex-shrink:0;
      background:#ffffff;
      border-radius:8px;
      box-shadow:0 2px 6px rgba(15,23,42,0.28);
      padding:3px 6px;
    }
    #epgLayer{
      position:fixed; top:88px; left:20px; width:300px; bottom:88px; z-index:4;
      background:rgba(10,12,24,0.32); backdrop-filter:blur(10px);
      border-radius:12px; border:1px solid rgba(255,255,255,.08);
      display:flex; flex-direction:column; transition:opacity 0.3s ease, transform 0.3s ease;
    }
    #channelLayer.dark{
      background:#020617;
      border-left:1px solid #111827;
    }
    #channelLayer.dark .channel-header{
      background:#020617;
      border-bottom:1px solid #1f2937;
    }
    #channelLayer.dark .channel-header-title{
      color:#f9fafb;
    }
    #channelLayer.dark .channel-theme-btn{
      background:#1f2937;
      color:#e5e7eb;
    }
    #channelLayer.dark .channel-close-btn{
      color:#9ca3af;
    }
    #channelLayer.dark .channel-search-wrap{
      background:#020617;
      border-bottom:1px solid #1f2937;
    }
    #channelLayer.dark .channel-search-input{
      background:#020617;
      border-color:#1f2937;
      color:#e5e7eb;
    }
    #channelLayer.dark .channel-search-input::placeholder{
      color:#6b7280;
    }
    #channelLayer.dark .channel-tabs-wrap{
      background:#020617;
      border-bottom:1px solid #1f2937;
    }
    #channelLayer.dark .channel-item{
      background:#020617;
      color:#f9fafb;
      box-shadow:0 1px 3px rgba(15,23,42,0.7);
    }
    #channelLayer.dark .channel-item.active{
      background:#111827;
      box-shadow:0 0 0 1px rgba(59,130,246,0.9);
    }
    #channelLayer.dark .channel-title{
      color:#f9fafb;
    }
    #channelLayer.dark .channel-sub{
      color:#f9fafb;
    }
    #channelLayer.dark .channel-count-badge{
      background:#1e293b;
      color:#93c5fd;
    }
    #channelLayer.dark .channel-index-badge{
      background:#111827;
      color:#bfdbfe;
    }
    #channelLayer.dark .channel-logo-right{
      background:#020617;
      box-shadow:0 2px 8px rgba(15,23,42,0.9);
    }
    #channelLayer.dark #catTabs .nav-link{
      color:#e5e7eb;
    }
    #epgLayer.hidden{opacity:0; pointer-events:none; transform:translateX(-20px)}
    .player-overlay-top{position:absolute;top:0;left:0;width:100%;z-index:5;pointer-events:none}
    .player-info-overlay{
      position:absolute; top:20px; right:30px; z-index:10;
      background:rgba(255,255,255,0.15); backdrop-filter:blur(10px);
      border-radius:12px; border:1px solid rgba(255,255,255,0.2);
      padding:15px 25px; box-shadow:0 8px 24px rgba(0,0,0,0.2);
      display:flex; flex-direction:column; align-items:center;
      pointer-events:none; transition:opacity 0.3s;
    }
    .player-info-overlay.is-hidden{opacity:0}
    .info-logo{height:48px; width:auto; object-fit:contain; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.3))}
    .info-title{font-size:18px; text-shadow:0 2px 4px rgba(0,0,0,0.5)}
    .info-sub{font-size:13px; text-shadow:0 1px 2px rgba(0,0,0,0.5)}
    .badge-live{background:linear-gradient(135deg,#ff3b3b,#ff6a00)}
    .badge-replay{background:linear-gradient(135deg,#1cc36b,#0e9f55)}
    .logo-img{height:26px; width:46px; object-fit:contain}
    .program-progress-label{
      position:absolute;
      left:0;
      right:0;
      bottom:100%;
      margin-bottom:2px;
      pointer-events:none;
      font-size:12px;
      color:rgba(255,255,255,0.8);
      text-shadow:0 1px 3px rgba(0,0,0,0.9);
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:0 4px;
    }
    .program-progress-mode{
      flex:0 0 auto;
      margin-right:8px;
      padding:0 6px;
      border-radius:999px;
      font-size:11px;
      line-height:16px;
      white-space:nowrap;
    }
    .program-progress-mode-live{
      background:linear-gradient(135deg,#ff3b3b,#ff6a00);
    }
    .program-progress-mode-replay{
      background:linear-gradient(135deg,#1cc36b,#0e9f55);
    }
    .program-progress-start,
    .program-progress-end{
      flex:0 0 auto;
      white-space:nowrap;
    }
    .program-progress-title{
      flex:1 1 auto;
      margin:0 8px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    ::-webkit-scrollbar{width:6px;height:6px}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,.05)}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
    ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.3)}
    #epgList{
      padding:4px 6px 6px;
    }
    .epg-item{
      font-size:13px;
      padding:6px 10px;
      margin:2px 0;
      border-radius:14px;
      border:0;
      background:transparent;
      cursor:pointer;
      color:#e5e7eb;
      text-align:left;
      transition:background 0.18s ease, box-shadow 0.18s ease, transform 0.18s ease;
    }
    .epg-item .small{
      font-size:12px;
      color:var(--muted);
    }
    .epg-item:hover{
      background:rgba(255,255,255,0.06);
      box-shadow:0 3px 8px rgba(15,23,42,0.5);
      transform:translateY(-1px);
    }
    .epg-item.active-epg{
      background:rgba(37,99,235,0.26);
      box-shadow:0 0 0 1px rgba(129,140,248,0.85),0 6px 14px rgba(15,23,42,0.7);
      transform:translateY(-1px);
    }
    #liveBtn{
      position:relative;
      width:36px;
      height:100%;
      padding:6px;
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.8);
      font-size:0;
      display:flex;
      align-items:center;
      justify-content:center;
      opacity:.9;
      margin-right:28px;
    }
    #liveBtn span{
      font-size:12px;
      white-space:nowrap;
    }
    #liveBtn_dot{
      width:8px;
      height:8px;
      border-radius:50%;
      margin-right:4px;
      background:#ef4444;
    }
    .live-dot-blink{
      animation:live-dot-blink 1s infinite;
    }
    @keyframes live-dot-blink{
      0%,50%{opacity:1}
      75%{opacity:0.2}
      100%{opacity:1}
    }
    #sourceBtn{
      position:relative;
      width:36px;
      height:100%;
      padding:6px;
      border:none;
      background:transparent;
      color:rgba(255,255,255,0.8);
      font-size:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
      pointer-events:auto;
      opacity:.9;
      margin-right:28px;
    }
    #sourceBtn:hover{
      color:#fff;
    }
    #sourceBtn span{
      font-size:12px;
      white-space:nowrap;
    }
    #sourcePanel{
      position:absolute;
      bottom:100%;
      left:50%;
      transform:translateX(-50%);
      margin-bottom:20px;
      max-height:50vh;
      overflow:auto;
      opacity:1;
      display:none;
      width:max-content;
      min-width:0;
      z-index:50;
      pointer-events:auto;
    }
    .source-row{
      padding:6px 10px;
      display:flex;
      align-items:center;
      gap:6px;
      font-size:12px;
      color:#fff;
      cursor:pointer;
    }
    .source-row:hover{
      background:rgba(255,255,255,0.08);
    }
    .source-row.active{
      background:rgba(37,99,235,0.28);
      color:#dbeafe;
    }
    .source-tag{
      width:6px;
      height:6px;
      border-radius:50%;
      background:#22c55e;
    }
  </style>
</head>
<body>
  <div id="playerLayer">
    <div id="app"></div>
    <div class="player-info-overlay">
       <div class="info-content text-center">
         <img id="logoImg" class="info-logo mb-2 d-none" alt="logo">
         <div id="titleEl" class="info-title fw-bold text-white mb-1">IPTV 播放</div>
         <div class="d-flex align-items-center justify-content-center gap-2">
            <span id="channelNumBadge" class="badge bg-light text-dark bg-opacity-75 rounded-1 px-1 py-0 small d-none"></span>
            <div id="subEl" class="info-sub small text-white-50"></div>
         </div>
       </div>
    </div>
    <div class="player-overlay-top d-flex justify-content-between align-items-start p-3">
      <div class="d-flex align-items-center gap-2">
        <span id="replayBadge" class="badge badge-replay rounded-pill px-3 py-2 d-none"><i class="bi bi-play-circle me-1"></i>正在回放</span>
        <span id="liveBadge" class="badge badge-live rounded-pill px-3 py-2 d-none"><i class="bi bi-broadcast me-1"></i>LIVE</span>
      </div>
    </div>
  </div>
  <div id="channelLayer">
    <div class="channel-header">
      <div class="channel-header-title">频道</div>
      <div class="channel-actions">
        <button id="themeToggleBtn" class="channel-theme-btn">浅色</button>
        <button id="closeSidebarBtn" class="channel-close-btn">×</button>
      </div>
    </div>
    <div class="channel-search-wrap">
      <input id="searchInput" class="channel-search-input" placeholder="搜索频道…">
    </div>
    <div class="channel-tabs-wrap">
      <ul id="catTabs" class="nav nav-pills small mb-0 flex-wrap"></ul>
    </div>
    <div id="channelScroll" class="channel-list-scroll">
      <div id="channelList" class="list-group list-group-flush"></div>
    </div>
  </div>
  <div id="epgLayer">
    <div class="p-3 border-bottom border-secondary d-flex align-items-center justify-content-between">
      <span class="fw-semibold">节目单</span>
      <div class="d-flex gap-1">
        <select id="epgSourceSel" class="form-select form-select-sm bg-dark text-white border-secondary py-0" style="width:auto;height:24px;font-size:12px"></select>
        <button id="epgRefreshBtn" class="btn btn-sm btn-link text-white p-0">↻</button>
      </div>
    </div>
    <div class="p-2 border-bottom border-secondary bg-black bg-opacity-25">
      <ul id="epgDateTabs" class="nav nav-pills gap-1 flex-nowrap" style="overflow-x:auto;padding-bottom:4px"></ul>
    </div>
    <div class="flex-grow-1" style="overflow-y:auto;">
      <div class="list-group list-group-flush" id="epgList"></div>
      <div id="epgHint" class="p-3 small text-white-50 text-center"></div>
    </div>
  </div>
  <script src="/vendor/hls.js/hls.min.js"></script>
  <script src="/vendor/mpegts.js/mpegts.js"></script>
  <script src="/vendor/qier-player/index.min.js"></script>
  <script>
    function qs(k){return new URLSearchParams(location.search).get(k)||''}
    var rawUrl=qs('url');
    var qierPlayer=null;
    var v=null;
    var currentPlayer=null;
    var _reco={n:0,t:null,stall:null};
    var sources=[];
    var currentSourceIndex=-1;
    var liveBtn=null;
    var liveLabelEl=null;
    var liveDot=null;
    var isLive=true;
    var isPlaying=false;
    var title=qs('title')||'IPTV 播放';
    var logo=qs('logo');
    var tvgId=qs('tvgId');
    var tvgName=qs('tvgName')||title;
    var liveFlag=(qs('live')==='1'||qs('live')==='true');
    var epgId=qs('epgId')||'';
    var uiCompact=(qs('ui')==='mini'||qs('sidebar')==='0'||qs('hideUi')==='1');
    if(liveFlag===false){
      isLive=false;
    }
    var sourceBtn=null;
    var sourceLabelEl=null;
    var sourcePanel=null;
    var titleEl=document.getElementById('titleEl');
    var subEl=document.getElementById('subEl');
    var logoImg=document.getElementById('logoImg');
    var liveBadge=document.getElementById('liveBadge');
    var replayBadge=document.getElementById('replayBadge');
    var channelLayer=document.getElementById('channelLayer');
    var epgLayer=document.getElementById('epgLayer');
    var closeBtn=document.getElementById('closeSidebarBtn');
    var infoOverlay=document.querySelector('.player-info-overlay');
    var uiTimer=null;
    var isHoveringUi=false;
    var UI_HIDE_MS=3000;
    var lastHideTs=0;
    var infoTimer=null;
    var INFO_HIDE_MS=10000;
    var epgHint=document.getElementById('epgHint');
    var epgList=document.getElementById('epgList');
    var epgSel=document.getElementById('epgSourceSel');
    var epgRefresh=document.getElementById('epgRefreshBtn');
    var epgDateTabs=document.getElementById('epgDateTabs');
    var epgSources=[];
    var selectedDate=new Date();

    var catTabs=document.getElementById('catTabs');
    var searchInput=document.getElementById('searchInput');
    var channelList=document.getElementById('channelList');
    var selectedCat='all';
    var streams=[];
    var current=null;
    var currentReplayProgram=null;
    var currentLiveProgram=null;
    var currentLiveTitle='';
    var channelNowTitleByKey={};
    var themeToggleBtn=document.getElementById('themeToggleBtn');
    var isChannelDark=false;
    var progressInfoWrap=null;
    var progressInfoMode=null;
    var progressInfoStart=null;
    var progressInfoTitle=null;
    var progressInfoEnd=null;

    if(titleEl) titleEl.textContent=title;
    if(subEl) subEl.textContent=tvgName||'';
    if(logo && logoImg){logoImg.src=logo; logoImg.classList.remove('d-none')}
    if(liveFlag && liveBadge) liveBadge.classList.remove('d-none');
    if(uiCompact){
      if(channelLayer) channelLayer.classList.add('collapsed');
      if(epgLayer) epgLayer.style.display='none';
      if(closeBtn) closeBtn.classList.add('d-none');
      if(themeToggleBtn) themeToggleBtn.classList.add('d-none');
    }
    applyChannelTheme();

    function logStatus(msg){
      console.log('[test-player]',msg);
    }

    function applyChannelTheme(){
      if(!channelLayer) return;
      if(isChannelDark){
        channelLayer.classList.add('dark');
        if(themeToggleBtn) themeToggleBtn.textContent='深色';
      }else{
        channelLayer.classList.remove('dark');
        if(themeToggleBtn) themeToggleBtn.textContent='浅色';
      }
    }
    if(themeToggleBtn){
      themeToggleBtn.onclick=function(){
        isChannelDark=!isChannelDark;
        applyChannelTheme();
      };
    }

    if(channelLayer){
      channelLayer.addEventListener('mouseenter',function(){
        isHoveringUi=true;
        if(uiTimer) clearTimeout(uiTimer);
      });
      channelLayer.addEventListener('mouseleave',function(){
        isHoveringUi=false;
        resetUiTimer();
      });
    }
    if(epgLayer){
      epgLayer.addEventListener('mouseenter',function(){
        isHoveringUi=true;
        if(uiTimer) clearTimeout(uiTimer);
      });
      epgLayer.addEventListener('mouseleave',function(){
        isHoveringUi=false;
        resetUiTimer();
      });
    }

    function updateLiveDotBlink(){
      if(!liveDot) return;
      if(isPlaying){
        liveDot.classList.add('live-dot-blink');
      }else{
        liveDot.classList.remove('live-dot-blink');
      }
    }

    function updateLiveBadge(){
      if(!liveBtn || !liveDot) return;
      if(isLive){
        liveDot.style.background='#ef4444';
      }else{
        liveDot.style.background='#22c55e';
      }
      updateLiveDotBlink();
      if(liveLabelEl) liveLabelEl.textContent='';
    }

    function ensureProgressProgramUi(){
      if(progressInfoWrap && progressInfoTitle) return;
      var root=qierPlayer&&qierPlayer.el;
      if(!root) return;
      var prog=root.querySelector('.qier-player_progress');
      if(!prog) return;
      if(getComputedStyle(prog).position==='static'){
        prog.style.position='relative';
      }
      var wrap=document.createElement('div');
      wrap.className='program-progress-label d-none';
      var modeSpan=document.createElement('span');
      var startSpan=document.createElement('span');
      var titleSpan=document.createElement('span');
      var endSpan=document.createElement('span');
      modeSpan.className='program-progress-mode';
      startSpan.className='program-progress-start';
      titleSpan.className='program-progress-title';
      endSpan.className='program-progress-end';
      wrap.appendChild(modeSpan);
      wrap.appendChild(startSpan);
      wrap.appendChild(titleSpan);
      wrap.appendChild(endSpan);
      prog.appendChild(wrap);
      progressInfoWrap=wrap;
      progressInfoMode=modeSpan;
      progressInfoStart=startSpan;
      progressInfoTitle=titleSpan;
      progressInfoEnd=endSpan;
      updateProgramProgressLabel();
    }

    function formatHm(ms){
      if(typeof ms!=='number') return '';
      var d=new Date(ms);
      var h=String(d.getHours()).padStart(2,'0');
      var m=String(d.getMinutes()).padStart(2,'0');
      return h+':'+m;
    }

    function updateProgramProgressLabel(){
      if(!progressInfoWrap || !progressInfoTitle || !progressInfoStart || !progressInfoEnd || !progressInfoMode) return;
      var prog=null;
      var mode='';
      if(currentReplayProgram){
        prog=currentReplayProgram;
        mode='replay';
      }else if(currentLiveProgram){
        prog=currentLiveProgram;
        mode='live';
      }
      if(!prog){
        progressInfoWrap.classList.add('d-none');
        progressInfoStart.textContent='';
        progressInfoTitle.textContent='';
        progressInfoEnd.textContent='';
        progressInfoMode.textContent='';
        progressInfoMode.classList.remove('program-progress-mode-live','program-progress-mode-replay');
        return;
      }
      var startStr=formatHm(prog.startMs);
      var endStr=formatHm(prog.endMs);
      var title=prog.title||'';
      progressInfoStart.textContent=startStr;
      progressInfoTitle.textContent=title||'';
      progressInfoEnd.textContent=endStr;
      if(mode==='live'){
        progressInfoMode.textContent='直播';
        progressInfoMode.classList.add('program-progress-mode-live');
        progressInfoMode.classList.remove('program-progress-mode-replay');
      }else if(mode==='replay'){
        progressInfoMode.textContent='回放';
        progressInfoMode.classList.add('program-progress-mode-replay');
        progressInfoMode.classList.remove('program-progress-mode-live');
      }else{
        progressInfoMode.textContent='';
        progressInfoMode.classList.remove('program-progress-mode-live','program-progress-mode-replay');
      }
      if(!startStr && !endStr && !title && !progressInfoMode.textContent){
        progressInfoWrap.classList.add('d-none');
      }else{
        progressInfoWrap.classList.remove('d-none');
      }
    }

    function resolve(url){

    function resetReco(){

    function scheduleReco(playUrl){
      if(_reco.n>=5) return;
      var d=Math.min(15000,Math.round(1000*Math.pow(1.8,_reco.n)));
      _reco.n++;
      if(_reco.t) clearTimeout(_reco.t);
      _reco.t=setTimeout(function(){
        if(playUrl){ start(playUrl) }
      },d);
      logStatus('计划重试第 '+_reco.n+' 次，'+d+'ms 后');
    }

    function normalizeName(v){ return String(v||'').trim().replace(/\s+/g,''); }
    function areaOf(r){
      var m=String(r||'').trim().match(/^(\d+)\s*x\s*(\d+)$/i);
      if(!m) return 0;
      var w=parseInt(m[1],10),h=parseInt(m[2],10);
      if(isNaN(w)||isNaN(h)) return 0;
      return w*h;
    }
    function cctvNumberFrom(str){
      var m=String(str||'').toUpperCase().match(/CCTV[ -]?(\d{1,2})/);
      if(!m) return null;
      var n=parseInt(m[1],10);
      if(!isNaN(n)&&n>=1&&n<=60) return n;
      return null;
    }
    function resTag(r){
      var m=String(r||'').trim().match(/^(\d+)\s*x\s*(\d+)$/i);
      if(!m) return '';
      var w=parseInt(m[1],10),h=parseInt(m[2],10);
      if((!isNaN(w)&&w>=3200)||(!isNaN(h)&&h>=1800)) return 'UHD';
      if((!isNaN(w)&&w>=1280)||(!isNaN(h)&&h>=720)) return 'HD';
      return 'SD';
    }
    function formatFps(fr){
      var v2=parseFloat(fr);
      if(isNaN(v2)) return '';
      var r=Math.round(v2);
      if(Math.abs(v2-r)<0.01) return String(r)+'fps';
      return String(parseFloat(v2.toFixed(2)))+'fps';
    }
    function channelKeyFromStream(s){ return normalizeName(s.tvgName||s.name||''); }
    function describeSource(it){
      if(!it) return '';
      var isMc=isMulticastStream(it);
      var rt=resTag(it.resolution||'');
      var fps=it.frameRate?formatFps(it.frameRate):'';
      var base=isMc?'组播':'单播';
      var tail=(rt?('-'+rt):'')+(fps?('-'+fps):'');
      return base+tail;
    }
    function isMulticastStream(s){
      var u=String(s.multicastUrl||'').trim();
      var scheme=u.split(':')[0].toLowerCase();
      return !!s.udpxyUrl||scheme==='rtp'||scheme==='udp'||u.indexOf('/rtp/')>-1;
    }
    function isCctvName(nm){ return /^(CCTV|央视)/i.test(String(nm||'')); }
    function isWeiShiName(nm,grp){
      var n=String(nm||''),g=String(grp||'');
      return /卫视/.test(n)||/卫视/.test(g);
    }
    function matchSearch(s,q){
      if(!q) return true;
      var a=(String(s.name||'')+' '+String(s.tvgName||'')+' '+String(s.tvgId||'')+' '+String(s.groupTitle||'')).toLowerCase();
      return a.indexOf(q.toLowerCase())>=0;
    }
    function groupByName(list){
      var map={};
      list.forEach(function(s){
        var key=normalizeName(s.tvgName||s.name||'');
        if(!map[key]) map[key]={name:(s.tvgName||s.name||'未命名频道'),key:key,logo:s.logo||'',items:[]};
        map[key].items.push(s);
      });
      return map;
    }
    function classifyChannelEntry(entry){
      var nm=String(entry&&entry.name||'');
      var first=entry&&entry.items&&entry.items[0]||{};
      var grp=String(first.groupTitle||'');
      if(isCctvName(nm)){
        var num=cctvNumberFrom(nm);
        if(num===null||isNaN(num)) num=999;
        return {cat:0,num:num,group:grp,name:nm};
      }
      if(isWeiShiName(nm,grp)){
        return {cat:1,num:0,group:grp,name:nm};
      }
      return {cat:2,num:0,group:grp,name:nm};
    }

    function start(playUrl){
      if(!playUrl){
        logStatus('没有播放地址');
        return;
      }
      if(!v){
        mountQier();
      }
      destroyPlayer();
      resetReco();
      var isM3u8=/\.m3u8(\?|$)/i.test(rawUrl)||rawUrl.indexOf('m3u8')>-1;
      if(isM3u8){
        if(window.Hls&&Hls.isSupported()){
          var h=new Hls({
            lowLatencyMode:false,
            capLevelToPlayerSize:true,
            backBufferLength:30,
            liveSyncDurationCount:3,
            liveMaxLatencyDurationCount:8,
            maxBufferLength:20,
            maxBufferHole:1,
            nudgeOffset:0.1,
            nudgeMaxRetry:5,
            fragLoadingMaxRetry:3,
            levelLoadingMaxRetry:3,
            manifestLoadingMaxRetry:3,
            fragLoadingRetryDelay:1000,
            levelLoadingRetryDelay:1000,
            manifestLoadingRetryDelay:1000
          });
          currentPlayer=h;
          v._hls=h;
          h.on(Hls.Events.MEDIA_ATTACHED,function(){resetReco();logStatus('HLS 已绑定媒体')});
          h.on(Hls.Events.LEVEL_UPDATED,function(){resetReco()});
          h.on(Hls.Events.ERROR,function(_,data){
            if(!data||!data.fatal) return;
            logStatus('HLS fatal error: '+data.type);
            if(data.type===Hls.ErrorTypes.NETWORK_ERROR){scheduleReco(playUrl)}
            else if(data.type===Hls.ErrorTypes.MEDIA_ERROR){
              try{h.recoverMediaError()}catch(e){scheduleReco(playUrl)}
            }else{
              scheduleReco(playUrl);
            }
          });
          v.addEventListener('playing',resetReco,{once:true,passive:true});
          v.addEventListener('loadeddata',function(){logStatus('已加载数据')},{once:true,passive:true});
          h.loadSource(playUrl);
          h.attachMedia(v);
          v.play&&v.play().catch(function(e){logStatus('play 调用失败: '+e)});
          logStatus('开始 HLS 播放');
          return;
        }
        v.src=playUrl;
        v.onstalled=function(){
          if(_reco.stall) clearTimeout(_reco.stall);
          _reco.stall=setTimeout(function(){
            v.load();
            v.play&&v.play().catch(function(){});
          },15000);
        };
        v.onwaiting=v.onstalled;
        v.play&&v.play().catch(function(e){logStatus('原生 HLS 播放失败: '+e)});
        logStatus('使用原生 HLS 播放');
        return;
      }
      if(!window.mpegts||!mpegts.isSupported()||!mpegts.getFeatureList().mseLivePlayback){
        v.src=playUrl;
        v.play().catch(function(e){logStatus('直接播放 TS 失败: '+e)});
        logStatus('环境不支持 mpegts.js，尝试直接播放');
        return;
      }
      if(mpegts.LoggingControl){
        try{
          mpegts.LoggingControl.enableDebug=false;
          mpegts.LoggingControl.enableVerbose=false;
        }catch(e){}
      }
      var mediaDataSource={type:'mse',isLive:true,url:playUrl,liveBufferLatencyChasing:true};
      var config={
        isLive:true,
        enableStashBuffer:true,
        stashInitialSize:512*1024,
        liveBufferLatencyChasing:true,
        liveBufferLatencyMaxLatency:1.2,
        liveBufferLatencyMinRemain:0.5,
        autoCleanupSourceBuffer:true,
        autoCleanupMaxBackwardDuration:120,
        autoCleanupMinBackwardDuration:60,
        fixAudioTimestampGap:true,
        lazyLoad:false
      };
      try{
        var player=mpegts.createPlayer(mediaDataSource,config);
        currentPlayer=player;
        player.attachMediaElement(v);
        player.load();
        player.play();
        player.on(mpegts.Events.ERROR,function(type,detail){
          logStatus('mpegts error: '+type);
          scheduleReco(playUrl);
        });
        logStatus('开始 mpegts.js 播放');
      }catch(e){
        logStatus('创建 mpegts player 失败: '+e);
      }
    }

    function isPlayable(s){
      var u=String(s.multicastUrl||'').trim();
      return /^https?:\/\//i.test(u)||/^(rtp|udp):\/\//i.test(u);
    }

    function liveRawUrl(s){
      var u=String(s.multicastUrl||'').trim();
      var base=u;
      if(/^(rtp|udp):\/\//i.test(u)&&s.udpxyUrl){
        var udpxy=String(s.udpxyUrl).trim().replace(/\/+$/,'');
        var addr=u.replace(/^(rtp|udp):\/\//i,'');
        base=udpxy+'/rtp/'+addr;
      }
      var isMc=isMulticastStream(s);
      var raw=base;
      if(isMc && s.httpParam){
        var hasQ=raw.indexOf('?')>-1;
        if(raw.indexOf(s.httpParam)===-1){
          raw=raw+(hasQ?'&':'?')+s.httpParam;
        }
      }
      return raw;
    }

    function getScope(){
      try{
        return (localStorage.getItem('useExternal')==='true')?'external':'internal';
      }catch(e){
        return 'internal';
      }
    }

    function channelKey(s){
      return String((s&&s.tvgName)||s&&s.name||'').trim().replace(/\s+/g,'').replace(/4K$/i,'');
    }

    function playable(u){
      return /^https?:\/\//i.test(u)||/^(rtp|udp):\/\//i.test(u);
    }

    function sourcesForStream(s){
      if(!s) return [];
      var key=channelKey(s);
      var list=streams.filter(function(x){
        return channelKey(x)===key && playable(String(x.multicastUrl||''));
      });
      list.sort(function(a,b){
        var aM=isMulticastStream(a)?1:0,bM=isMulticastStream(b)?1:0;
        if(aM!==bM) return bM-aM;
        var ar=areaOf(a.resolution),br=areaOf(b.resolution);
        if(ar!==br) return br-ar;
        var af=parseFloat(a.frameRate)||0,bf=parseFloat(b.frameRate)||0;
        return bf-af;
      });
      return list;
    }

    function fetchAndRenderEpg(stream,opts){
      var d=selectedDate||new Date();
      d.setHours(0,0,0,0);
      var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
      var pd=new Date(d);
      pd.setDate(d.getDate()-1);
      var py=pd.getFullYear(),pm=String(pd.getMonth()+1).padStart(2,'0'),pdd=String(pd.getDate()).padStart(2,'0');
      var s=stream||current||{};
      var chId=s.tvgId||s.tvgName||s.name||tvgId||title||'';
      var chName=s.tvgName||s.name||tvgName||title||'';
      var baseParams=function(dateStr){
        var p=new URLSearchParams();
        p.set('scope','internal');
        p.set('channelId',chId);
        p.set('channelName',chName);
        p.set('date',dateStr);
        if(epgId||(epgSel&&epgSel.value)) p.set('epgId',(epgSel&&epgSel.value)||epgId);
        if(opts&&opts.force) p.set('force','1');
        p.set('t',String(Date.now()));
        return p.toString();
      };
      var p1=fetch('/api/epg/programs?'+baseParams(y+'-'+m+'-'+dd)).then(function(r){return r.json()}).catch(function(){return{};});
      var p2=fetch('/api/epg/programs?'+baseParams(py+'-'+pm+'-'+pdd)).then(function(r){return r.json()}).catch(function(){return{};});
      Promise.all([p1,p2]).then(function(res){
        var curr=Array.isArray(res[0].programs)?res[0].programs:[];
        var prev=Array.isArray(res[1].programs)?res[1].programs:[];
        var dayStart=d.getTime();
        var dayEnd=dayStart+86400000;
        var fromPrev=prev.filter(function(p){return p.endMs>dayStart;});
        var fromCurr=curr.filter(function(p){return p.startMs<dayEnd;});
        var map={};
        fromPrev.forEach(function(p){map[p.startMs]=p;});
        fromCurr.forEach(function(p){map[p.startMs]=p;});
        var list=Object.values(map).sort(function(a,b){return a.startMs-b.startMs;});
        list=list.filter(function(p){return p.startMs<dayEnd && p.endMs>dayStart;});
        renderEpgList(list,stream);
      });
    }

    function loadEpgForStream(s){
      fetchAndRenderEpg(s);
    }

    function doReplay(s,p){
      currentReplayProgram=p;
      updateProgramProgressLabel();
      var qsObj=new URLSearchParams();
      qsObj.set('scope',getScope());
      qsObj.set('fmt','ku9');
      qsObj.set('proto','http');
      qsObj.set('name',s.name||'');
      qsObj.set('tvgName',s.tvgName||'');
      qsObj.set('resolution',s.resolution||'');
      qsObj.set('frameRate',s.frameRate||'');
      qsObj.set('multicastUrl',s.multicastUrl||'');
      qsObj.set('catchupBase',s.catchupBase||'');
      qsObj.set('startMs',p.startMs);
      qsObj.set('endMs',p.endMs);
      fetch('/api/catchup/play?'+qsObj.toString()).then(function(r){return r.json()}).then(function(x){
        if(x&&x.success&&x.url){
          var raw=x.url;
          var isM3u8=/\.m3u8(\?|$)/i.test(raw)||raw.indexOf('m3u8')>-1;
          rawUrl=raw;
          var playUrl=isM3u8?('/api/proxy/hls?url='+encodeURIComponent(raw)):('/api/proxy/stream?url='+encodeURIComponent(raw));
          if(subEl) subEl.textContent=p.title||'';
          if(liveBadge) liveBadge.classList.add('d-none');
          if(replayBadge) replayBadge.classList.remove('d-none');
          isLive=false;
          updateLiveBadge();
          showInfo();
          start(playUrl);
        }else{
          alert('无法获取回放地址');
        }
      }).catch(function(e){
        alert('回放请求失败: '+e);
      });
    }

    function renderEpgList(list,s){
      if(!epgList||!epgHint) return;
      epgList.innerHTML='';
      if(!Array.isArray(list)||list.length===0){
        epgHint.textContent='暂无节目单';
        return;
      }
      epgHint.textContent='';
      var now=Date.now();
      var foundLive=false;
      list.forEach(function(p){
        var it=document.createElement('button');
        it.type='button';
        it.className='list-group-item list-group-item-action bg-transparent epg-item d-flex justify-content-between align-items-center';
        var tm=new Date(p.startMs),em=new Date(p.endMs);
        var t=String(tm.getHours()).padStart(2,'0')+':'+String(tm.getMinutes()).padStart(2,'0')+' - '+String(em.getHours()).padStart(2,'0')+':'+String(em.getMinutes()).padStart(2,'0');
        var left=document.createElement('div');
        left.innerHTML='<div class="small muted">'+t+'</div><div>'+ (p.title||'无标题') +'</div>';
        var right=document.createElement('div');
        var isLiveNow=p.startMs<=now && p.endMs>now;
        var isPast=p.endMs<=now;
        if(isLiveNow){
          right.innerHTML='<span class="badge badge-live rounded-pill px-2 py-1">LIVE</span>';
          it.classList.add('active-epg');
          foundLive=true;
          currentLiveTitle=p.title||'';
        currentLiveProgram=p;
          var keyForNow=null;
          if(s){keyForNow=channelKeyFromStream(s);}
          else if(current){keyForNow=channelKeyFromStream(current);}
          if(keyForNow){channelNowTitleByKey[keyForNow]=p.title||'';}
          if(subEl && replayBadge && replayBadge.classList.contains('d-none')){
            subEl.textContent=p.title||'';
          }
          showInfo();
        updateProgramProgressLabel();
        }else if(!isPast){
          right.innerHTML='<span class="badge bg-secondary">未开始</span>';
        }else{
          if(currentReplayProgram && p.startMs===currentReplayProgram.startMs && p.title===currentReplayProgram.title){
            right.innerHTML='<span class="badge badge-replay rounded-pill px-2 py-1">正在回放</span>';
            it.classList.add('active-epg');
          }else{
            right.innerHTML='<span class="badge bg-success">已播</span>';
          }
        }
        it.appendChild(left);
        it.appendChild(right);
        it.onclick=function(){
          if(isLiveNow){
            currentReplayProgram=null;
          currentLiveProgram=p;
          updateProgramProgressLabel();
            startLiveFor(s||current);
            renderEpgList(list,s||current);
          }else if(!isPast){
          }else{
            doReplay(s||current,p);
            renderEpgList(list,s||current);
          }
        };
        epgList.appendChild(it);
      });
      if(foundLive){
        setTimeout(function(){
          var act=epgList.querySelector('.active-epg');
          if(act) act.scrollIntoView({behavior:'smooth',block:'center'});
        },100);
      }
    }

    function buildDateTabs(){
      if(!epgDateTabs) return;
      epgDateTabs.innerHTML='';
      var today=new Date();
      today.setHours(0,0,0,0);
      var items=[];
      for(var i=-3;i<=3;i++){
        var d=new Date(today);
        d.setDate(today.getDate()+i);
        items.push(d);
      }
      items.forEach(function(d){
        var mm=String(d.getMonth()+1).padStart(2,'0');
        var dd=String(d.getDate()).padStart(2,'0');
        var w=['日','一','二','三','四','五','六'][d.getDay()];
        var sd=new Date(selectedDate);
        sd.setHours(0,0,0,0);
        var isSel=d.getTime()===sd.getTime();
        var btnEl=document.createElement('button');
        btnEl.className='nav-link py-0 px-2 small text-nowrap'+(isSel?' active':'');
        btnEl.textContent=(d.getTime()===today.getTime()?'今日':'周'+w)+' '+mm+'/'+dd;
        btnEl.onclick=function(){
          selectedDate=new Date(d);
          buildDateTabs();
          if(current) loadEpgForStream(current); else fetchAndRenderEpg(null);
        };
        var li=document.createElement('li');
        li.className='nav-item';
        li.appendChild(btnEl);
        epgDateTabs.appendChild(li);
        if(isSel){
          setTimeout(function(){
            li.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
          },100);
        }
      });
    }

    function buildCatTabs(){
      if(!catTabs) return;
      var map={};
      streams.forEach(function(s){
        var g=String(s.groupTitle||'').trim();
        if(g) map[g]=true;
      });
      var groups=Object.keys(map).sort(function(a,b){
        return String(a).localeCompare(String(b),'zh-CN',{numeric:true,sensitivity:'base'});
      });
      catTabs.innerHTML='';
      var defs=[{t:'全部',v:'all'}];
      var all=defs.concat(groups.map(function(g){return {t:g,v:'group:'+g};}));
      all.forEach(function(it){
        var li=document.createElement('li');
        li.className='nav-item';
        var btnEl=document.createElement('button');
        btnEl.className='nav-link py-1'+(selectedCat===it.v?' active':'');
        btnEl.setAttribute('data-cat',it.v);
        btnEl.textContent=it.t;
        btnEl.onclick=function(){
          Array.from(catTabs.querySelectorAll('button[data-cat]')).forEach(function(x){x.classList.remove('active');});
          this.classList.add('active');
          selectedCat=this.getAttribute('data-cat');
          renderChannels();
        };
        li.appendChild(btnEl);
        catTabs.appendChild(li);
      });
    }

    function renderChannels(){
      if(!channelList) return;
      var q=searchInput?searchInput.value||'':'';
      var filtered=streams.filter(function(s){
        if(!matchSearch(s,q)) return false;
        if(selectedCat==='all') return true;
        if(/^group:/.test(selectedCat)) return String(s.groupTitle||'')===selectedCat.slice(6);
        return true;
      });
      var grouped=groupByName(filtered);
      channelList.innerHTML='';
      var entries=Object.keys(grouped).map(function(k){return grouped[k];});
      entries.sort(function(a,b){
        var ca=classifyChannelEntry(a);
        var cb=classifyChannelEntry(b);
        if(ca.cat!==cb.cat) return ca.cat-cb.cat;
        if(ca.cat===0 && ca.num!==cb.num) return ca.num-cb.num;
        var ga=String(ca.group||'');
        var gb=String(cb.group||'');
        var gcmp=ga.localeCompare(gb,'zh-CN',{numeric:true,sensitivity:'base'});
        if(gcmp!==0) return gcmp;
        return String(ca.name||'').localeCompare(String(cb.name||''),'zh-CN',{numeric:true,sensitivity:'base'});
      });
      entries.forEach(function(entry,idx){
        var sourcesForEntry=entry.items.filter(function(s){
          var u=String(s.multicastUrl||'').trim();
          return /^https?:\/\//i.test(u)||/^(rtp|udp):\/\//i.test(u);
        });
        if(sourcesForEntry.length===0) return;
        sourcesForEntry.sort(function(a,b){
          var areaA=areaOf(a.resolution),areaB=areaOf(b.resolution);
          if(areaA!==areaB) return areaB-areaA;
          var fpsA=parseFloat(a.frameRate)||0,fpsB=parseFloat(b.frameRate)||0;
          return fpsB-fpsA;
        });
        var item=document.createElement('div');
        var isAct=current&&normalizeName(current.tvgName||current.name||'')===entry.key;
        item.className='list-group-item border-0 channel-item'+(isAct?' active':'');
        item.setAttribute('data-key',entry.key);
        var head=document.createElement('div');
        head.className='d-flex align-items-center gap-2';

        var idxSpan=document.createElement('div');
        idxSpan.className='channel-index-badge';
        idxSpan.textContent=String(idx+1);
        head.appendChild(idxSpan);

        var textWrap=document.createElement('div');
        textWrap.className='flex-grow-1 overflow-hidden';

        var groupTitle=(sourcesForEntry[0]&&sourcesForEntry[0].groupTitle)||'';
        var hasReplay=entry.items.some(function(s){
          var cb=String(s.catchupBase||'').trim();
          if(cb) return true;
          var hp=String(s.httpParam||'');
          return /(?:^|[&?])fcc=/.test(hp);
        });

        var titleDiv=document.createElement('div');
        titleDiv.className='channel-title d-flex align-items-center gap-1';
        var titleSpan=document.createElement('span');
        titleSpan.className='channel-title-text text-truncate';
        titleSpan.textContent=entry.name;
        titleDiv.appendChild(titleSpan);
        if(hasReplay){
          var replayIcon=document.createElement('i');
          replayIcon.className='bi bi-clock-history channel-replay-icon';
          replayIcon.title='支持回放';
          titleDiv.appendChild(replayIcon);
        }
        textWrap.appendChild(titleDiv);

        var subDiv=document.createElement('div');
        subDiv.className='channel-sub small text-truncate';
        var baseText=groupTitle||'';
        if(baseText) subDiv.textContent=baseText;
        var nowTitle=channelNowTitleByKey[entry.key]||'';
        if(nowTitle){
          subDiv.textContent=baseText ? (baseText+' · '+nowTitle) : nowTitle;
        }else{
          (function(entryRef,elRef,groupText){
            var key=entryRef.key;
            if(!key) return;
            var s0=(entryRef.items && entryRef.items[0])?entryRef.items[0]:null;
            if(!s0) return;
            var chId=s0.tvgId||s0.tvgName||s0.name||'';
            var chName=s0.tvgName||s0.name||'';
            if(!chId && !chName) return;
            var d=new Date();
            var y=d.getFullYear();
            var m=String(d.getMonth()+1).padStart(2,'0');
            var dd=String(d.getDate()).padStart(2,'0');
            var params=new URLSearchParams();
            params.set('scope','internal');
            params.set('channelId',chId);
            params.set('channelName',chName);
            params.set('date',y+'-'+m+'-'+dd);
            if(epgId||(epgSel&&epgSel.value)) params.set('epgId',(epgSel&&epgSel.value)||epgId);
            fetch('/api/epg/programs?'+params.toString()).then(function(r){return r.json()}).then(function(j){
              var list=Array.isArray(j&&j.programs)?j.programs:[];
              var now=Date.now();
              var cur=null;
              for(var i=0;i<list.length;i++){
                var p=list[i];
                if(p && p.startMs<=now && p.endMs>now){cur=p;break;}
              }
              if(!cur && list.length>0){
                for(var j2=list.length-1;j2>=0;j2--){
                  var pp=list[j2];
                  if(pp && pp.startMs<=now){cur=pp;break;}
                }
                if(!cur) cur=list[0];
              }
              if(cur && cur.title){
                channelNowTitleByKey[key]=cur.title;
                if(elRef){
                  var base=groupText||'';
                  elRef.textContent=base ? (base+' · '+cur.title) : cur.title;
                }
              }
            }).catch(function(){});
          })(entry,subDiv,groupTitle);
        }
        textWrap.appendChild(subDiv);
        head.appendChild(textWrap);

        var rightWrap=document.createElement('div');
        rightWrap.className='d-flex align-items-center gap-2 ms-auto';
        var count=document.createElement('span');
        count.className='badge channel-count-badge';
        count.textContent=String(sourcesForEntry.length)+'源';
        rightWrap.appendChild(count);
        if(entry.logo){
          var im=document.createElement('img');
          im.src=entry.logo;
          im.className='logo-img channel-logo-right';
          rightWrap.appendChild(im);
        }
        head.appendChild(rightWrap);

        head.onclick=function(){
          var best=sourcesForEntry && sourcesForEntry.length>0 ? sourcesForEntry[0] : null;
          if(best) startLiveFor(best);
        };
        item.appendChild(head);
        channelList.appendChild(item);
      });
    }

    function loadStreams(){
      function defaultStart(list){
        if(current||rawUrl) return;
        var cands=list.filter(function(s){
          var u=String(s.multicastUrl||'').trim();
          return /^https?:\/\//i.test(u)||/^(rtp|udp):\/\//i.test(u);
        });
        var cctv1List=cands.filter(function(x){
          var n=String(x.tvgName||x.name||'');
          return /^CCTV\s*1(\b|[^0-9])/i.test(n)||/^CCTV1\b/i.test(n);
        });
        var best=null;
        if(cctv1List.length>0){
          cctv1List.sort(function(a,b){
            var isMcA=isMulticastStream(a)?1:0;
            var isMcB=isMulticastStream(b)?1:0;
            if(isMcA!==isMcB) return isMcB-isMcA;
            var rA=areaOf(a.resolution),rB=areaOf(b.resolution);
            if(rA!==rB) return rB-rA;
            var fpsA=parseFloat(a.frameRate)||0,fpsB=parseFloat(b.frameRate)||0;
            return fpsB-fpsA;
          });
          best=cctv1List[0];
        }else if(cands.length>0){
          best=cands[0];
        }
        if(best) startLiveFor(best);
      }
      fetch('/api/streams').then(function(r){return r.json()}).then(function(j){
        var list=Array.isArray(j&&j.streams)?j.streams:[];
        streams=list;
        buildCatTabs();
        renderChannels();
        var pre=tvgName||title;
        if(pre){
          var p=list.filter(function(x){return (x.tvgName||x.name||'')===pre;});
          if(p.length>0) startLiveFor(p[0]); else defaultStart(list);
        }else{
          defaultStart(list);
        }
      }).catch(function(){});
    }

    function loadEpgSources(){
      if(!epgSel) return;
      epgSel.innerHTML='<option value="">自动</option>';
      fetch('/api/config/epg-sources').then(function(r){return r.json()}).then(function(j){
        if(j && j.success && Array.isArray(j.sources)){
          epgSources=j.sources;
          j.sources.forEach(function(s){
            var opt=document.createElement('option');
            opt.value=s.id;
            opt.textContent=s.name+(s.scope?('('+s.scope+')'):'');
            epgSel.appendChild(opt);
          });
          if(epgId) epgSel.value=epgId;
        }
      }).catch(function(){});
    }

    if(epgSel){
      epgSel.onchange=function(){
        if(current) loadEpgForStream(current); else fetchAndRenderEpg(null);
      };
    }
    if(epgRefresh){
      epgRefresh.onclick=function(){
        if(current) fetchAndRenderEpg(current,{force:true}); else fetchAndRenderEpg(null,{force:true});
      };
    }
    if(searchInput){
      searchInput.oninput=renderChannels;
    }

    mountQier();
    if(uiCompact){
      if(rawUrl){
        var playUrlInit=resolve(rawUrl);
        start(playUrlInit);
      }
    }else{
      buildDateTabs();
      loadEpgSources();
      loadStreams();
    }
  </script>
</body>
</html>

    function apiRequest(url, options){
      if(window.IptvCore&&window.IptvCore.api&&typeof window.IptvCore.api.request==='function'){
        return window.IptvCore.api.request(url, options||{});
      }
      return fetch(url, options||{}).then(function(r){
        return r.text().then(function(t){
          var ct=(r.headers&&r.headers.get?r.headers.get('content-type'):'')||'';
          var data=t;
          if(ct.indexOf('application/json')!==-1){
            try{ data=JSON.parse(t||'{}'); }catch(e){ data={}; }
          }
          return { ok:r.ok, status:r.status, data:data };
        });
      });
    }
    function apiJson(url, options){
      return apiRequest(url, options).then(function(resp){ return resp&&resp.data?resp.data:{}; });
    }

    function logoUrlForSized(name,opts){
      var u=logoUrlFor(name);
      if(!u) return u;
      var arr=[];
      if(opts&&opts.w) arr.push('w='+encodeURIComponent(opts.w));
      if(opts&&opts.h) arr.push('h='+encodeURIComponent(opts.h));
      if(opts&&opts.fit) arr.push('fit='+encodeURIComponent(opts.fit));
      if(opts&&opts.fmt) arr.push('fmt='+encodeURIComponent(opts.fmt));
      if(arr.length===0) return u;
      return u+(u.indexOf('?')===-1?'?':'&')+arr.join('&');
    }

    function stripAnySchemeLocal(url){
      return String(url||'').replace(/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//,'');
    }
    function detectUrlSchemeLocal(url,fallback){
      var m=String(url||'').trim().match(/^([a-zA-Z][a-zA-Z0-9+.-]*):\/\//);
      return (m&&m[1])?String(m[1]).toLowerCase():String(fallback||'http').toLowerCase();
    }
    function normalizeProxyBaseUrlLocal(base){
      var b=String(base||'').trim();
      if(!b) return '';
      if(!/^https?:\/\//i.test(b)) b='http://'+b.replace(/^\/+/,'');
      return b;
    }
    function applyUnicastProxyModeLocal(rawUrl,proxyBaseUrl,mode,defaultScheme){
      var raw=String(rawUrl||'').trim();
      var pb=normalizeProxyBaseUrlLocal(proxyBaseUrl).replace(/\/+$/,'');
      if(!raw||!pb) return raw;
      if(raw.toLowerCase().startsWith((pb+'/').toLowerCase())) return raw;
      var md=String(mode||'path_no_scheme').toLowerCase();
      var sch=detectUrlSchemeLocal(raw,defaultScheme||'http');
      var rawNoScheme=stripAnySchemeLocal(raw).replace(/^\/+/,'');
      var rawWithScheme=/^[a-zA-Z][a-zA-Z0-9+.-]*:\/\//.test(raw)?raw:(sch+'://'+rawNoScheme);
      if(md==='full_url') return pb+'/'+rawWithScheme;
      if(md==='with_proto_segment') return pb+'/'+sch+'/'+rawNoScheme;
      return pb+'/'+rawNoScheme;
    }
    function currentReplayProxyModeLocal(){
      var m=String(replayProxyMode||'path_no_scheme').toLowerCase();
      return (m==='with_proto_segment'||m==='full_url')?m:'path_no_scheme';
    }
    function ensureReplayProxyModeLoaded(force){
      var shouldForce=(force===true);
      if(replayProxyModePromise) return replayProxyModePromise;
      var now=Date.now();
      if(!shouldForce&&replayProxyModeLoadedAt>0&&(now-replayProxyModeLoadedAt)<15000) return Promise.resolve();
      replayProxyModePromise=apiJson('/api/system/replay-rules/selection').then(function(j){
        var mode=String(j&&j.success&&j.selection&&j.selection.proxy?j.selection.proxy.mode:'').toLowerCase();
        replayProxyMode=(mode==='with_proto_segment'||mode==='full_url')?mode:'path_no_scheme';
        replayProxyModeLoadedAt=Date.now();
      }).catch(function(){}).finally(function(){ replayProxyModePromise=null; });
      return replayProxyModePromise;
    }

    function applyChannelTheme(){
      if(!channelLayer) return;
      if(isChannelDark){
        channelLayer.classList.add('dark');
        if(epgLayer) epgLayer.classList.add('dark');

      }else{
        channelLayer.classList.remove('dark');
        if(epgLayer) epgLayer.classList.remove('dark');
        if(themeToggleBtn) themeToggleBtn.textContent='浅色';
      }
    }

    var __libLoaders={};
    function loadScriptOnce(url){
      if(__libLoaders[url]) return __libLoaders[url];
      __libLoaders[url]=new Promise(function(resolve,reject){
        try{
          var s=document.createElement('script');
          s.src=url;
          s.async=true;
          s.onload=function(){resolve(true)};
          s.onerror=function(){reject(new Error('load fail: '+url))};
          document.head.appendChild(s);
        }catch(e){reject(e)}
      });
      return __libLoaders[url];
    }
    var __loadingHls=false, __loadingMpegts=false;
    function ensureHls(){
      if(window.Hls) return Promise.resolve(true);
      if(__loadingHls) return (__libLoaders['/vendor/hls.js/hls.min.js']||Promise.resolve(true));
      __loadingHls=true;
      return loadScriptOnce('/vendor/hls.js/hls.min.js').catch(function(){});
    }
    function ensureMpegts(){
      if(window.mpegts) return Promise.resolve(true);
      if(__loadingMpegts) return (__libLoaders['/vendor/mpegts.js/mpegts.js']||Promise.resolve(true));
      __loadingMpegts=true;
      return loadScriptOnce('/vendor/mpegts.js/mpegts.js').catch(function(){});
    }

    function ensureProgressProgramUi(){
      if(progressInfoWrap && progressInfoTitle) return;
      var root=qierPlayer&&qierPlayer.el;
      if(!root) return;
      var prog=root.querySelector('.qier-player_progress');
      if(!prog) return;
      if(getComputedStyle(prog).position==='static'){
        prog.style.position='relative';
      }
      var wrap=document.createElement('div');
      wrap.className='program-progress-label d-none';
      var modeSpan=document.createElement('span');
      var startSpan=document.createElement('span');
      var titleSpan=document.createElement('span');
      var endSpan=document.createElement('span');
      var metaWrap=document.createElement('div');
      modeSpan.className='program-progress-mode';
      startSpan.className='program-progress-start';
      titleSpan.className='program-progress-title';
      endSpan.className='program-progress-end';
      metaWrap.className='program-progress-meta d-flex align-items-center gap-1';
      wrap.appendChild(modeSpan);
      wrap.appendChild(startSpan);
      wrap.appendChild(titleSpan);
      wrap.appendChild(metaWrap);
      wrap.appendChild(endSpan);
      prog.appendChild(wrap);
      progressInfoWrap=wrap;
      progressInfoMode=modeSpan;
      progressInfoStart=startSpan;
      progressInfoTitle=titleSpan;
      progressInfoEnd=endSpan;
      progressInfoMeta=metaWrap;
      updateProgramProgressLabel();
    }

    function formatHm(ms){
      if(typeof ms!=='number') return '';
      var d=new Date(ms);
      var h=String(d.getHours()).padStart(2,'0');
      var m=String(d.getMinutes()).padStart(2,'0');
      return h+':'+m;
    }

    function updateProgramProgressLabel(){
      if(!progressInfoWrap || !progressInfoTitle || !progressInfoStart || !progressInfoEnd || !progressInfoMode) return;
      var prog=null;
      var mode='';
      if(currentReplayProgram){
        prog=currentReplayProgram;
        mode='replay';
      }else if(currentLiveProgram){
        prog=currentLiveProgram;
        mode='live';
      }
      if(!prog){
        progressInfoWrap.classList.add('d-none');
        progressInfoStart.textContent='';
        progressInfoTitle.textContent='';
        progressInfoEnd.textContent='';
        progressInfoMode.textContent='';
        progressInfoMode.classList.remove('program-progress-mode-live','program-progress-mode-replay');
        if(progressInfoMeta) progressInfoMeta.innerHTML='';
        return;
      }
      var startStr=formatHm(prog.startMs);
      var endStr=formatHm(prog.endMs);
      var title=prog.title||'';
      progressInfoStart.textContent=startStr;
      progressInfoTitle.textContent=title||'';
      progressInfoEnd.textContent=endStr;
      if(mode==='live'){
        progressInfoMode.textContent='直播';
        progressInfoMode.classList.add('program-progress-mode-live');
        progressInfoMode.classList.remove('program-progress-mode-replay');
      }else if(mode==='replay'){
        progressInfoMode.textContent='回放';
        progressInfoMode.classList.add('program-progress-mode-replay');
        progressInfoMode.classList.remove('program-progress-mode-live');
      }else{
        progressInfoMode.textContent='';
        progressInfoMode.classList.remove('program-progress-mode-live','program-progress-mode-replay');
      }
      if(progressInfoMeta){
        var castLbl='';
        var qualityLbl='';
        var fpsLbl='';
        var audioLbl=''; // 后端暂未提供声道信息，保留为空
        var codecLbl='';
        if(current){
          if(mode==='replay'){
            castLbl='单播';
          }else{
            castLbl=isMulticastStream(current)?'组播':'单播';
          }
          qualityLbl=resTag(current.resolution||'')||'';
          fpsLbl=current.frameRate?formatFps(current.frameRate):'';

    function resolve(url){
      var nm=(current&&((current.tvgName||current.name)||''))||(tvgName||title||'');
      var md=isLive?'直播':'回放';
      var prog='';
      if(isLive && currentLiveProgram && currentLiveProgram.title){ prog=currentLiveProgram.title; }
      if(!isLive && currentReplayProgram && currentReplayProgram.title){ prog=currentReplayProgram.title; }
      var sc=getScope();
      var resolver=window.IptvCore&&window.IptvCore.player?window.IptvCore.player.playUrlResolver:null;
      var meta=(resolver&&typeof resolver.buildLiveMeta==='function')
        ? resolver.buildLiveMeta(url,{ title:nm, mode:md, programTitle:prog, scope:sc })
        : (function(){
            var cast='单播';
            try{
              var raw=String(url||'').trim();
              var isMc=/^(rtp|udp):\/\//i.test(raw)||/\/rtp\//i.test(raw);
              cast=isMc?'组播':'单播';
            }catch(e){}
            if(md==='回放') cast='单播';
            return {title:nm,mode:md,cast:cast,programTitle:prog,scope:sc};
          })();
      if(resolver&&typeof resolver.resolveLive==='function'){
        return resolver.resolveLive(url,meta);
      }
      var src=String(url||'');
      var m=/\.m3u8(\?|$)/i.test(src)||src.indexOf('m3u8')>-1;
      var base=m?('/api/proxy/hls?url='):('/api/proxy/stream?url=');
      var qs=[];
      if(meta&&meta.title) qs.push('title='+encodeURIComponent(meta.title));
      if(meta&&meta.mode) qs.push('mode='+encodeURIComponent(meta.mode));
      if(meta&&meta.cast) qs.push('cast='+encodeURIComponent(meta.cast));
      if(meta&&meta.programTitle) qs.push('programTitle='+encodeURIComponent(meta.programTitle));
      if(meta&&meta.scope) qs.push('scope='+encodeURIComponent(meta.scope));
      return base+encodeURIComponent(src)+(qs.length?('&'+qs.join('&')):'');
    }

    function scheduleReco(playUrl){
      var rs=ensureRetryStrategy();
      if(rs&&typeof rs.schedule==='function'){ rs.schedule(playUrl); return; }
      if(_reco.seq!==playSeq) return;
      if(_reco.n>=5) return;
      var d=Math.min(15000,Math.round(1000*Math.pow(1.8,_reco.n)));

      if(_reco.t) clearTimeout(_reco.t);
      var seq=playSeq;

    function normalizeName(v){ return String(v||'').trim().replace(/\s+/g,''); }
    function is4kStream(s){
      var r=String((s&&s.resolution)||'').trim().toLowerCase();
      if(r==='3840x2160'||r==='4096x2160') return true;
      var nm=String((s&&(s.tvgName||s.name))||'').toUpperCase();
      return /(?:^|[\s\-_])4K(?:$|[\s\-_])/.test(nm)||/2160P/.test(nm);
    }
    function baseChannelName(s){
      var raw=String((s&&(s.tvgName||s.name))||'').trim();
      var next=raw.replace(/\s+/g,' ').replace(/(?:\s*[-_])?\s*(4K|2160P)\s*$/i,'').trim();
      return next||raw;
    }
    function exportChannelName(s){
      var base=baseChannelName(s);
      if(is4kStream(s)) return /4K$/i.test(base)?base:(base+' 4K');
      return base;
    }
    function inferGroupByName(nm,fallback){
      var name=String(nm||'');
      if(/CCTV/i.test(name)) return '央视频道';
      if(/卫视/.test(name)) return '卫视频道';
      if(/(凤凰|翡翠|本港台|港台|TVB|明珠)/i.test(name)) return '港台频道';
      if(/(少儿|卡通|动漫)/.test(name)) return '少儿频道';
      if(/(购物|导购)/.test(name)) return '购物频道';
      return fallback||'未分类频道';
    }
    function streamDisplayGroup(s){
      var raw=String((s&&s.groupTitle)||'').trim();
      if(is4kStream(s)) return '4K频道';
      if(/4K/.test(raw)) return inferGroupByName(exportChannelName(s),'卫视频道');
      return raw||inferGroupByName(exportChannelName(s),'未分类频道');
    }
    function streamDisplayKey(s){
      return normalizeName(exportChannelName(s))+'|'+(is4kStream(s)?'4k':'normal');
    }
    function areaOf(r){
      var m=String(r||'').trim().match(/^(\d+)\s*x\s*(\d+)$/i);
      if(!m) return 0;
      var w=parseInt(m[1],10),h=parseInt(m[2],10);
      if(isNaN(w)||isNaN(h)) return 0;
      return w*h;
    }
    function bitRateValue(v){
      if(typeof v==='number' && !isNaN(v)) return v;
      var s=String(v||'').trim().toLowerCase();
      if(!s) return 0;
      var n=parseFloat(s);
      if(/mbps/.test(s)) return isNaN(n)?0:n*1000000;
      if(/kbps/.test(s)) return isNaN(n)?0:n*1000;
      if(/bps/.test(s)) return isNaN(n)?0:n;
      return isNaN(n)?0:n;
    }
    function cctvNumberFrom(str){
      var m=String(str||'').toUpperCase().match(/CCTV[ -]?(\d{1,2})/);
      if(!m) return null;
      var n=parseInt(m[1],10);
      if(!isNaN(n)&&n>=1&&n<=60) return n;
      return null;
    }
    function resTag(r){
      var m=String(r||'').trim().match(/^(\d+)\s*x\s*(\d+)$/i);
      if(!m) return '';
      var w=parseInt(m[1],10),h=parseInt(m[2],10);
      if((!isNaN(w)&&w>=3200)||(!isNaN(h)&&h>=1800)) return 'UHD';
      if((!isNaN(w)&&w>=1280)||(!isNaN(h)&&h>=720)) return 'HD';
      return 'SD';
    }
    function formatFps(fr){
      var v2=parseFloat(fr);
      if(isNaN(v2)) return '';
      var r=Math.round(v2);
      if(Math.abs(v2-r)<0.01) return String(r)+'fps';
      return String(parseFloat(v2.toFixed(2)))+'fps';
    }
    function formatCodec(c){
      var v=String(c||'').trim().toLowerCase();
      if(!v) return '';
      if(v==='hevc'||v==='h265'||v==='h.265') return 'HEVC';
      if(v==='h264'||v==='h.264'||v==='avc') return 'AVC';
      if(v.indexOf('mpeg2')!==-1||v==='mpeg-2') return 'MPEG-2';
      if(v.indexOf('mpeg4')!==-1||v==='mpeg-4') return 'MPEG-4';
      if(v==='vp9') return 'VP9';
      if(v==='av1') return 'AV1';
      return v.toUpperCase();
    }
    function channelKeyFromStream(s){ return streamDisplayKey(s); }
    function describeSource(it){
      if(!it) return '';
      var isMc=isMulticastStream(it);
      var rt=resTag(it.resolution||'');
      var fps=it.frameRate?formatFps(it.frameRate):'';
      var base=isMc?'组播':'单播';
      var tail=(rt?('-'+rt):'')+(fps?('-'+fps):'');
      return base+tail;

    function isMulticastStream(s){

          v._hls=h;
          if(sk&&typeof sk.bindHlsCoreEvents==='function'){
            sk.bindHlsCoreEvents(h,{resetReco:resetReco,logStatus:logStatus});
          }
          if(sk&&typeof sk.createHlsErrorHandler==='function'){
            h.on(Hls.Events.ERROR,sk.createHlsErrorHandler(seq,playSeq,function(){scheduleReco(playUrl);},logStatus));
          }
          h.loadSource(playUrl);
          h.attachMedia(v);
          if(sk&&typeof sk.bindVideoPlayEvents==='function'){
            sk.bindVideoPlayEvents(v,seq,playSeq,{resetReco:resetReco,setPlayPriority:setPlayPriority,logStatus:logStatus});
          }
          if(sk&&typeof sk.initVideoPlayAttempt==='function'){
            sk.initVideoPlayAttempt(v,null,{
              onAutoplayBlocked:function(){ onAutoplayBlocked(function(){ try{ v.muted=false; v.removeAttribute('muted'); }catch(e){} v.play&&v.play().catch(function(){}); }); },
              onError:function(e){ logStatus('play 调用失败: '+e); },
              logStatus:logStatus
            });
          }
          logStatus('开始 HLS 播放');
          return;
        }
        if(sk&&typeof sk.startNativeHls==='function'){
          sk.startNativeHls(v,playUrl,seq,playSeq,{
            _reco:_reco,
            initVideoPlayAttempt:sk.initVideoPlayAttempt,
            onAutoplayBlocked:function(){ onAutoplayBlocked(function(){ try{ v.muted=false; v.removeAttribute('muted'); }catch(e){} v.play&&v.play().catch(function(){}); }); },
            setPlayPriority:setPlayPriority,
            logStatus:logStatus
          });
        }
        return;
      }
      if(!window.mpegts){
        ensureMpegts().then(function(){ start(playUrl, seq); });
        return;
      }
      var canMpegts=sk&&typeof sk.canUseMpegts==='function'?sk.canUseMpegts(window.mpegts):(window.mpegts&&mpegts.isSupported()&&mpegts.getFeatureList().mseLivePlayback);
      if(!canMpegts){
        if(sk&&typeof sk.playDirectTs==='function'){
          sk.playDirectTs(v,playUrl,logStatus);
        }
        return;
      }
      if(sk&&typeof sk.applyMpegtsLogging==='function'){ sk.applyMpegtsLogging(mpegts); }
      var profile=sk&&typeof sk.createMpegtsProfile==='function'?sk.createMpegtsProfile(playUrl):null;
      try{
        if(sk&&typeof sk.startMpegtsPlayer==='function'){
          currentPlayer=sk.startMpegtsPlayer(mpegts,v,profile,seq,playSeq,autoplayAwaitClick,{
            onAutoplayBlocked:function(){ onAutoplayBlocked(function(){ currentPlayer&&currentPlayer.play&&currentPlayer.play(); }); },
            setPlayPriority:setPlayPriority,
            createMpegtsErrorHandler:sk.createMpegtsErrorHandler,
            scheduleReco:function(){scheduleReco(playUrl);},
            logStatus:logStatus
          });
        }
      }catch(e){
        logStatus('创建 mpegts player 失败: '+e);
      }
    }

    function expandAndFocusChannel(key){

    function isPlayable(s){
      var u=String(s.multicastUrl||'').trim();
      return /^https?:\/\//i.test(u)||/^(rtp|udp):\/\//i.test(u);
    }

    function liveRawUrl(s){
      var u=String(s.multicastUrl||'').trim();
      if(u.indexOf('$')!==-1){ u=u.split('$')[0]; }
      var base=u;
      if(/^(rtp|udp):\/\//i.test(u)&&s.udpxyUrl){
        var udpxy=String(s.udpxyUrl).trim().replace(/\/+$/,'');
        var addr=u.replace(/^(rtp|udp):\/\//i,'');
        base=udpxy+'/rtp/'+addr;
      }
      var isMc=isMulticastStream(s);
      var raw=base;
      if(isMc && s.httpParam){
        var hasQ=raw.indexOf('?')>-1;
        if(raw.indexOf(s.httpParam)===-1){
          raw=raw+(hasQ?'&':'?')+s.httpParam;
        }
      }
      return raw;
    }

    function getScope(){
      try{
        return (localStorage.getItem('useExternal')==='true')?'external':'internal';
      }catch(e){
        return 'internal';
      }

    function isExternalScope(){
      return getScope()==='external';
    }

    function buildEpgProgramsQuery(params){
      var p=params||{};
      var epgSvc=window.IptvCore&&window.IptvCore.player&&window.IptvCore.player.epgService;
      if(epgSvc&&typeof epgSvc.buildProgramsQuery==='function'){
        return epgSvc.buildProgramsQuery(p);
      }
      var q=new URLSearchParams();
      q.set('scope',String(p.scope||'internal'));

      if(p.epgId) q.set('epgId',String(p.epgId));

    function channelKey(s){
      return String((s&&s.tvgName)||s&&s.name||'').trim().replace(/\s+/g,'');
    }

    function hasReplaySupport(s){
      var cb=String((s&&s.catchupBase)||'').trim();
      if(cb) return true;
      var hp=String((s&&s.httpParam)||'');
      return /(?:^|[&?])fcc=/.test(hp);
    }

    function compareSourceQuality(a,b){
      var ar=areaOf(a&&a.resolution),br=areaOf(b&&b.resolution);
      if(ar!==br) return br-ar;
      var af=parseFloat(a&&a.frameRate)||0,bf=parseFloat(b&&b.frameRate)||0;
      return bf-af;
    }

    function sourcesForStream(s){
      if(!s) return [];
      var key=streamDisplayKey(s);
      var list=streams.filter(function(x){
        return streamDisplayKey(x)===key && isPlayable(x);
      });
      list.sort(function(a,b){
        var aR=hasReplaySupport(a)?1:0,bR=hasReplaySupport(b)?1:0;
        if(aR!==bR) return bR-aR;
        var aM=isMulticastStream(a)?1:0,bM=isMulticastStream(b)?1:0;
        if(aM!==bM) return aM-bM;
        var ab=bitRateValue(a.bitRate),bb=bitRateValue(b.bitRate);
        if(ab!==bb) return bb-ab;
        return compareSourceQuality(a,b);
      });
      return list;
    }

    function renderSourcePanelFor(s){
      var list=sourcesForStream(s);
      sources=list.map(function(it){
        return {url:liveRawUrl(it),label:describeSource(it),meta:it};
      });
      var activeIdx=list.findIndex(function(it){
        return it.multicastUrl===s.multicastUrl && it.resolution===s.resolution && it.frameRate===s.frameRate;
      });
      if(activeIdx<0 && list.length>0) activeIdx=0;
      currentSourceIndex=activeIdx;
      renderSourceList();
      if(currentSourceIndex>=0 && sources[currentSourceIndex]){
        if(sourceBtn) sourceBtn.title = sources[currentSourceIndex].label;
        if(sourceLabelEl) sourceLabelEl.textContent = sources[currentSourceIndex].label;
      }
    }

    function fetchAndRenderEpg(stream,opts){
      var d=selectedDate||new Date();
      d.setHours(0,0,0,0);
      var y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0'),dd=String(d.getDate()).padStart(2,'0');
      var pd=new Date(d);
      pd.setDate(d.getDate()-1);
      var py=pd.getFullYear(),pm=String(pd.getMonth()+1).padStart(2,'0'),pdd=String(pd.getDate()).padStart(2,'0');
      var s=stream||current||{};
      var chId=s.tvgId||s.tvgName||s.name||tvgId||title||'';
      var chName=s.tvgName||s.name||tvgName||title||'';
      var dayStart=d.getTime();
      var scopeVal=getScope();
      var selectedEpgId=(epgSel&&epgSel.value)||epgId;
      var epgSvc=window.IptvCore&&window.IptvCore.player&&window.IptvCore.player.epgService;
      if(epgSvc&&typeof epgSvc.fetchPrograms==='function'&&typeof epgSvc.mergeProgramsForDay==='function'){
        Promise.all([
          epgSvc.fetchPrograms({ scope:scopeVal, channelId:chId, channelName:chName, date:y+'-'+m+'-'+dd, epgId:selectedEpgId, force:opts&&opts.force }),
          epgSvc.fetchPrograms({ scope:scopeVal, channelId:chId, channelName:chName, date:py+'-'+pm+'-'+pdd, epgId:selectedEpgId, force:opts&&opts.force })
        ]).then(function(res){
          var list=epgSvc.mergeProgramsForDay(res[0],res[1],dayStart);
          renderEpgList(list,stream);
        });
        return;
      }
      var baseParams=function(dateStr){
        return buildEpgProgramsQuery({
          scope:scopeVal,
          channelId:chId,
          channelName:chName,
          date:dateStr,
          epgId:selectedEpgId,
          force:opts&&opts.force
        });
      };
      var p1=apiJson('/api/epg/programs?'+baseParams(y+'-'+m+'-'+dd)).catch(function(){return{};});
      var p2=apiJson('/api/epg/programs?'+baseParams(py+'-'+pm+'-'+pdd)).catch(function(){return{};});
      Promise.all([p1,p2]).then(function(res){
        var curr=Array.isArray(res[0].programs)?res[0].programs:[];
        var prev=Array.isArray(res[1].programs)?res[1].programs:[];
        var dayEnd=dayStart+86400000;
        var fromPrev=prev.filter(function(p){return p.endMs>dayStart;});
        var fromCurr=curr.filter(function(p){return p.startMs<dayEnd;});
        var map={};
        fromPrev.forEach(function(p){map[p.startMs]=p;});
        fromCurr.forEach(function(p){map[p.startMs]=p;});
        var list=Object.values(map).sort(function(a,b){return a.startMs-b.startMs;});
        list=list.filter(function(p){return p.startMs<dayEnd && p.endMs>dayStart;});
        renderEpgList(list,stream);
      });
    }

    function loadEpgForStream(s){
      fetchAndRenderEpg(s);
    }

    function doReplay(s,p){
      var catchupSvc=getCatchupService();
      var clickKey=String((s&&((s.tvgName||s.name)||''))+'|'+(p&&p.startMs||'')+'|'+(p&&p.endMs||''));
      var nowTs=Date.now();
      if(clickKey && clickKey===lastReplayClickKey && (nowTs-lastReplayClickTs)<800){
        return;
      }
      lastReplayClickKey=clickKey;
      lastReplayClickTs=nowTs;
      replayRequestSeq++;
      var reqSeq=replayRequestSeq;
      var replayCandidate=(sourcesForStream(s)||[]).find(function(x){return hasReplaySupport(x);})||s;
      s=replayCandidate||s;
      currentReplayProgram=p;
      updateProgramProgressLabel();
      var scopeVal=getScope();
      var resolver = getPlayUrlResolver();
      var replayOptions = getReplayOptions(scopeVal, resolver);
      if(catchupSvc && typeof catchupSvc.executeReplay === 'function'){
        catchupSvc.executeReplay(s, p, { scope:scopeVal, resolver:resolver }, {
          onSuccess:function(replayState, replayCtx){
            if(reqSeq!==replayRequestSeq) return;
            rawUrl=replayCtx.raw;
            if(subEl) subEl.textContent=p.title||'';
            if(liveBadge) liveBadge.classList.add('d-none');
            if(replayBadge) replayBadge.classList.remove('d-none');
            isLive=false;
            updateLiveBadge();
            showInfo();
            reportPlayerLog(replayState.logPayload);
            start(replayCtx.playUrl);
          },
          onFailure:function(msg){
            if(reqSeq!==replayRequestSeq) return;
            alert(msg);
          },
          onError:function(msg){
            if(reqSeq!==replayRequestSeq) return;
            alert(msg);
          }
        });
      }else{
        var req = catchupSvc && typeof catchupSvc.requestReplayWithEntryFallback === 'function'
          ? catchupSvc.requestReplayWithEntryFallback(s, p, replayOptions)
          : apiJson('/api/catchup/play?'+new URLSearchParams({
              scope:scopeVal,
              fmt:(s&&s.catchupFormat)?String(s.catchupFormat):'default',
              proto:((String(s&&s.catchupBase||s&&s.multicastUrl||'').split(':')[0]||'').toLowerCase()==='rtsp')?'rtsp':'http',
              name:s.name||'',
              tvgName:s.tvgName||'',
              resolution:s.resolution||'',
              frameRate:s.frameRate||'',
              multicastUrl:(s.sourceMulticastUrl||s.multicastUrl||''),
              catchupBase:s.catchupBase||'',
              startMs:p.startMs,
              endMs:p.endMs
            }).toString());
        req.then(function(x){
          if(reqSeq!==replayRequestSeq) return;
          var outcomeFn=catchupSvc && typeof catchupSvc.resolveReplayOutcomeWithEntryFallback === 'function'
            ? catchupSvc.resolveReplayOutcomeWithEntryFallback
            : function(resp,err,ss,pp,oo){ return Promise.resolve({ ok:false, message:catchupSvc&&typeof catchupSvc.getReplayFailureMessage==='function'?catchupSvc.getReplayFailureMessage(resp,err):'无法获取回放地址' }); };
          outcomeFn(x, null, s, p, replayOptions).then(function(outcome){
            if(reqSeq!==replayRequestSeq) return;
            if(!outcome||!outcome.ok){
              alert(catchupSvc&&typeof catchupSvc.resolveReplayAlertWithFallback==='function'?catchupSvc.resolveReplayAlertWithFallback(outcome, x, null):(outcome&&outcome.message||'无法获取回放地址'));
              return;
            }
            var replayState=outcome.replayState;
            rawUrl=replayState.replayCtx.raw;
            if(subEl) subEl.textContent=p.title||'';
            if(liveBadge) liveBadge.classList.add('d-none');
            if(replayBadge) replayBadge.classList.remove('d-none');
            isLive=false;
            updateLiveBadge();
            showInfo();
            reportPlayerLog(replayState.logPayload);
            start(replayState.replayCtx.playUrl);
          });
        }).catch(function(e){
          if(reqSeq!==replayRequestSeq) return;
          alert(catchupSvc&&typeof catchupSvc.getReplayFailureMessage==='function'?catchupSvc.getReplayFailureMessage(null, e):('回放请求失败: '+e));
        });
      }
    }

      var buildEpgRenderContext=function(){
        return {
          epgRenderer:window.IptvCore&&window.IptvCore.player&&window.IptvCore.player.epgRenderer,

        };
      };
      var epgOrc=window.IptvCore&&window.IptvCore.player&&window.IptvCore.player.epgOrchestrator;

      var epgFb=window.IptvCore&&window.IptvCore.player&&window.IptvCore.player.epgFallbackRenderer;

    function buildCatTabs(){

      });

          this.classList.add('active');

      });

    // 并发控制：限制“当前节目”并发请求，避免首屏卡顿
    var NOW_FETCH_MAX=4;
    var nowFetchInFlight=0;
    var nowFetchQueue=[];
    function runNowFetchQueue(){
      if(nowFetchInFlight>=NOW_FETCH_MAX) return;
      var t=nowFetchQueue.shift();
      if(!t) return;
      nowFetchInFlight++;
      t(function done(){
        nowFetchInFlight=Math.max(0,nowFetchInFlight-1);
        if(nowFetchQueue.length>0){
          // 让浏览器喘口气
          setTimeout(runNowFetchQueue,0);
        }
      });
    }

    var channelNowObserver=null;
    var nonCriticalInited=false;
    function ensureNowObserver(){
      if(channelNowObserver) return channelNowObserver;
      var root=document.getElementById('channelScroll')||null;
      try{
        if('IntersectionObserver' in window){
          channelNowObserver=new IntersectionObserver(function(entries){
            entries.forEach(function(en){
              var t=en.target;
              if(!en.isIntersecting) return;
              if(t && t._nowFetchPayload && !t._nowFetched){
                t._nowFetched=true;
                var p=t._nowFetchPayload;
                enqueueNowFetch(p.entry,p.el,p.group);
              }
              if(channelNowObserver) channelNowObserver.unobserve(t);
            });
          },{root:root,threshold:0.05});
        }
      }catch(e){}
      return channelNowObserver;
    }
    function enqueueNowFetch(entryRef,elRef,groupText){
      var key=entryRef.key;
      if(!key) return;
      var s0=(entryRef.items && entryRef.items[0])?entryRef.items[0]:null;
      if(!s0) return;
      var chId=s0.tvgId||s0.tvgName||s0.name||'';
      var chName=s0.tvgName||s0.name||'';
      if(!chId && !chName) return;
      nowFetchQueue.push(function(done){
        var d=new Date();
        var y=d.getFullYear();
        var m=String(d.getMonth()+1).padStart(2,'0');
        var dd=String(d.getDate()).padStart(2,'0');
        var query=buildEpgProgramsQuery({
          scope:getScope(),
          channelId:chId,
          channelName:chName,
          date:y+'-'+m+'-'+dd,
          epgId:(epgSel&&epgSel.value)||epgId
        });
        apiJson('/api/epg/programs?'+query).then(function(j){
          var list=Array.isArray(j&&j.programs)?j.programs:[];
          var now=Date.now();
          var cur=null;
          for(var i=0;i<list.length;i++){
            var p=list[i];
            if(p && p.startMs<=now && p.endMs>now){cur=p;break;}
          }
          if(!cur && list.length>0){
            for(var j2=list.length-1;j2>=0;j2--){
              var pp=list[j2];
              if(pp && pp.startMs<=now){cur=pp;break;}
            }
            if(!cur) cur=list[0];
          }
          if(cur && cur.title){
            channelNowTitleByKey[key]=cur.title;
            if(elRef){
              var base=groupText||'';
              elRef.textContent=base ? (base+' · '+cur.title) : cur.title;
            }
          }
        }).catch(function(){}).finally(function(){done()});
      });
      runNowFetchQueue();
    }
    function nonCriticalInit(){
      if(nonCriticalInited) return;
      nonCriticalInited=true;
      buildDateTabs();
      loadEpgSources();
      loadStreams();
      ensureChannelListToggleUi();
    }

    function renderChannels(){
      if(!channelList) return;
      var q=searchInput?searchInput.value||'':'';
      var filtered=streams.filter(function(s){
        if(!matchSearch(s,q)) return false;
        if(selectedCat==='all') return true;
        if(/^group:/.test(selectedCat)){
          var g=selectedCat.slice(6);
          return streamDisplayGroup(s)===g;
        }
        return true;
      });
      var grouped=groupByName(filtered);
      channelList.innerHTML='';
      var entries=Object.keys(grouped).map(function(k){return grouped[k];});
      entries.sort(function(a,b){
        var ca=classifyChannelEntry(a);
        var cb=classifyChannelEntry(b);
        if(ca.cat!==cb.cat) return ca.cat-cb.cat;
        if(ca.cat===0 && ca.num!==cb.num) return ca.num-cb.num;
        var ga=String(ca.group||'');
        var gb=String(cb.group||'');
        var gcmp=ga.localeCompare(gb,'zh-CN',{numeric:true,sensitivity:'base'});
        if(gcmp!==0) return gcmp;
        return String(ca.name||'').localeCompare(String(cb.name||''),'zh-CN',{numeric:true,sensitivity:'base'});
      });
      // 分批渲染，减少长任务
      var BATCH=40, startIdx=0;
      function renderBatch(){
        var end=Math.min(entries.length,startIdx+BATCH);
        for(var i=startIdx;i<end;i++){
          var entry=entries[i];
          (function(entry,idx){
        var sourcesForEntry=entry.items.filter(function(s){
          return isPlayable(s);
        });
        if(sourcesForEntry.length===0) return;
        sourcesForEntry.sort(function(a,b){
          return compareSourceQuality(a,b);
        });
        var item=document.createElement('div');
        var isAct=current&&streamDisplayKey(current)===entry.key;
        item.className='list-group-item border-0 channel-item'+(isAct?' active':'');
        item.setAttribute('data-key',entry.key);
        var head=document.createElement('div');
        head.className='d-flex align-items-center gap-2';

        var idxSpan=document.createElement('div');
        idxSpan.className='channel-index-badge';
        idxSpan.textContent=String(idx+1);
        head.appendChild(idxSpan);

        var textWrap=document.createElement('div');
        textWrap.className='flex-grow-1 overflow-hidden';

        var groupTitle=streamDisplayGroup(sourcesForEntry[0]||{});
        var hasReplay=entry.items.some(function(s){ return hasReplaySupport(s); });

        var titleDiv=document.createElement('div');
        titleDiv.className='channel-title d-flex align-items-center gap-1';
        var titleSpan=document.createElement('span');
        titleSpan.className='channel-title-text text-truncate';
        titleSpan.textContent=entry.name;
        titleDiv.appendChild(titleSpan);
        if(hasReplay){
          var replayIcon=document.createElement('i');
          replayIcon.className='bi bi-clock-history channel-replay-icon';
          replayIcon.title='支持回放';
          titleDiv.appendChild(replayIcon);
        }
        textWrap.appendChild(titleDiv);

        var subDiv=document.createElement('div');
        subDiv.className='channel-sub small text-truncate';
        var baseText=groupTitle||'';
        if(baseText) subDiv.textContent=baseText;
        var nowTitle=channelNowTitleByKey[entry.key]||'';
        if(nowTitle){
          subDiv.textContent=baseText ? (baseText+' · '+nowTitle) : nowTitle;
        }else{
          var obs=ensureNowObserver();
          if(obs){
            item._nowFetchPayload={entry:entry,el:subDiv,group:groupTitle};
            obs.observe(item);
          }else{
            setTimeout(function(){enqueueNowFetch(entry,subDiv,groupTitle)},0);
          }
        }
        textWrap.appendChild(subDiv);
        head.appendChild(textWrap);

        var rightWrap=document.createElement('div');
        rightWrap.className='d-flex align-items-center gap-2 ms-auto';
        var count=document.createElement('span');
        count.className='badge channel-count-badge';
        count.textContent=String(sourcesForEntry.length)+'源';
        rightWrap.appendChild(count);
        var im=document.createElement('img');
        (function(){
          var src=logoUrlForSized(entry.name||entry.key||'',{w:72,h:40,fit:'contain',fmt:'webp'});
          im.onerror=function(){ this.onerror=null; this.src='/Sentinel.png'; };
          im.setAttribute('data-src',src||'');
          im.src='/Sentinel.png';
        })();
        im.className='logo-img channel-logo-right';
        try{im.loading='lazy';}catch(e){}
        try{im.decoding='async';}catch(e){}
        try{im.fetchPriority='low';}catch(e){}
        im.width=72; im.height=40;
        var logoObs=ensureLogoObserver();
        if(logoObs){
          logoObs.observe(im);
        }else if(!playPriority){
          loadLogoNow(im);
        }
        rightWrap.appendChild(im);
        head.appendChild(rightWrap);

        head.onclick=function(){
          var best=sourcesForEntry && sourcesForEntry.length>0 ? sourcesForEntry[0] : null;
          if(best) startLiveFor(best);
        };
        item.appendChild(head);
        channelList.appendChild(item);
          })(entry,i);
        }
        startIdx=end;
        if(startIdx<entries.length){
          setTimeout(renderBatch,0);
        }
      }
      renderBatch();
    }

    function getSettings(){
      if(settingsCache) return Promise.resolve(settingsCache);
      return apiJson('/api/settings').then(function(j){
        settingsCache=(j&&j.settings)||{};
        return settingsCache;
      }).catch(function(){return {};});
    }
    function loadLogoTemplate(){
      return apiJson('/api/config/logo-templates').then(function(j){
        var list=Array.isArray(j&&j.templatesObj)?j.templatesObj:[];
        var useExt=isExternalScope();
        var pick=null;
        if(useExt){
          pick=list.find(function(x){return x&&x.category==='外网台标';})||null;
        }else{
          pick=list.find(function(x){return x&&x.category==='内网台标';})||null;
        }
        externalLogoTpl=pick&&pick.url||'';
      }).catch(function(){});
    }
    function isExternalHost(){
      var h=window.location.hostname||'';
      if(h==='localhost'||h==='127.0.0.1') return false;
      if(/^192\.168\./.test(h)) return false;
      if(/^10\./.test(h)) return false;
      if(/^172\.(1[6-9]|2[0-9]|3[0-1])\./.test(h)) return false;
      return true;
    }
    function logoUrlFor(name){
      var nm=String(name||'').trim();
      if(!nm) return '';
      var scope=isExternalHost()?'external':getScope();
      if(scope==='external') return '';
      return '/api/logo?name='+encodeURIComponent(nm)+'&scope='+scope;
    }

    function loadStreams(){
      function mapExportStreams(lst,st,useExt){
        var proxyList=[];
        try{ proxyList=JSON.parse(localStorage.getItem('proxyList')||'[]'); }catch(e){ proxyList=[]; }
        if((!proxyList||proxyList.length===0)&&st&&Array.isArray(st.proxyList)) proxyList=st.proxyList;
        var proxyItem=(proxyList||[]).find(function(x){ return x&&x.type==='单播代理'; })||null;
        var proxyBase=proxyItem&&proxyItem.url?String(proxyItem.url).trim():'';
        return lst.map(function(it){
          var httpUrl=it.httpUrl||'';
          if(httpUrl.indexOf('$')!==-1){ httpUrl=httpUrl.split('$')[0]; }
          var srcMulticast=String(it.multicastUrl||'').trim();
          var srcScheme=srcMulticast.split(':')[0].toLowerCase();
          var isMulticastSrc=!!it.udpxyUrl||srcScheme==='rtp'||srcScheme==='udp'||/\/rtp\//i.test(srcMulticast)||/\/rtp\//i.test(httpUrl);
          if(useExt&&httpUrl&&!isMulticastSrc){
            var __pu=window.IptvCore&&window.IptvCore.shared;
            httpUrl=__pu?__pu.applyProxyMode(httpUrl,proxyBase,currentReplayProxyModeLocal(),__pu.detectUrlScheme(httpUrl,'http')):applyUnicastProxyModeLocal(httpUrl,proxyBase,currentReplayProxyModeLocal(),detectUrlSchemeLocal(httpUrl,'http'));
          }
          return {
            name:it.name||it.tvgName||'',
            tvgName:it.tvgName||it.name||'',
            tvgId:it.tvgId||'',
            logo:logoUrlFor(it.tvgName||it.name||''),
            groupTitle:it.groupTitle||'',
            resolution:it.resolution||'',
            frameRate:it.frameRate||'',
            codec:it.codec||'',
            multicastUrl:httpUrl,
            sourceMulticastUrl:srcMulticast,
            udpxyUrl:'',
            catchupFormat:it.catchupFormat||'',
            catchupBase:it.catchupBase||'',
            httpParam:it.httpParam||'',
            isAvailable:!!it.isAvailable
          };
        }).filter(function(x){return x.multicastUrl;});
      }
      function defaultStart(list){
        if(current||rawUrl) return;
        try{
          var savedName = '';
          var savedSourceRaw = '';
          try{ savedName = localStorage.getItem('lastChannelName') || ''; }catch(e){}
          try{ savedSourceRaw = localStorage.getItem('lastSource') || ''; }catch(e){}
          if(savedName){
            var sameNameList = list.filter(function(x){
              var nm = String(x.tvgName||x.name||'');
              return nm === savedName;
            });
            if(sameNameList.length>0){
              var pick = sameNameList[0];
              if(savedSourceRaw){
                try{
                  var ss = JSON.parse(savedSourceRaw);
                  if(ss && ss.name === savedName){
                    var matched = sameNameList.find(function(x){
                      return String(x.multicastUrl||'')===String(ss.multicastUrl||'') &&
                             String(x.resolution||'')===String(ss.resolution||'') &&
                             String(x.frameRate||'')===String(ss.frameRate||'');
                    });
                    if(matched) pick = matched;
                  }
                }catch(e){}
              }
              startLiveFor(pick);
              return;
            }
          }
        }catch(e){}
        return;
      }
      var useExt=isExternalScope();
      Promise.all([getSettings(),loadLogoTemplate(),ensureReplayProxyModeLoaded()]).then(function(arr){
        var st=arr[0]||{};
        var sc=useExt?'external':'internal';
        var qs='?status=all&scope='+encodeURIComponent(sc);
        var headers={};
        if(st&&st.enableToken&&st.securityToken){ headers['x-export-token']=String(st.securityToken); }
        return apiRequest('/api/export/json'+qs,{headers:headers}).then(function(r){
          if(r&&r.status===403){return {success:false,streams:[]};}
          return r&&r.data?r.data:{};
        }).then(function(j){
          var lst=Array.isArray(j&&j.streams)?j.streams:[];
          var mapped=mapExportStreams(lst,st,useExt);
          if(mapped.length===0 && !useExt){
            return apiJson('/api/streams').then(function(j2){
              var list=Array.isArray(j2&&j2.streams)?j2.streams:[];
              streams=list;
              buildCatTabs();
              renderChannels();
              var pre=tvgName||title;
              if(pre && !rawUrl && !current){
                var p=list.filter(function(x){return (x.tvgName||x.name||'')===pre;});
                if(p.length>0) startLiveFor(p[0]); else defaultStart(list);
              }else{
                defaultStart(list);
              }
            });
          }
          streams=mapped;
          buildCatTabs();
          renderChannels();
          var pre=tvgName||title;
          if(pre && !rawUrl && !current){
            var p=mapped.filter(function(x){return (x.tvgName||x.name||'')===pre;});
            if(p.length>0) startLiveFor(p[0]); else defaultStart(mapped);
          }else{
            defaultStart(mapped);
          }
        }).catch(function(){});
      });
    }

    function loadEpgSources(){
      if(!epgSel) return;
      epgSel.innerHTML='<option value="">自动</option>';
      apiJson('/api/config/epg-sources').then(function(j){
        if(j && j.success && Array.isArray(j.sources)){
          epgSources=j.sources;
          j.sources.forEach(function(s){
            var opt=document.createElement('option');
            opt.value=s.id;
            opt.textContent=s.name+(s.scope?('('+s.scope+')'):'');
            epgSel.appendChild(opt);
          });
          if(epgId) epgSel.value=epgId;
        }
      }).catch(function(){});
    }

    function applyDirectLiveContext(){
      if(!rawUrl) return;
      if(applyDirectLiveContext._done) return;
      applyDirectLiveContext._done=true;
      isLive=true;
      if(liveBadge) liveBadge.classList.remove('d-none');
      updateLiveBadge();
      if(titleEl) titleEl.textContent = title || tvgName || 'IPTV 播放';
      if(subEl) subEl.textContent = tvgName || title || '';
      showInfo();
      try{
        var nm = tvgName || title || '';
          var sObj = {
          name: nm,
          tvgName: nm,
          tvgId: tvgId || '',
          logo: (function(){
            var alt = logoUrlForSized(nm,{h:48,fit:'contain',fmt:'webp'});
            return logo || alt || '/Sentinel.png';
          })()
        };
        loadEpgForStream(sObj);
      }catch(e){}
    }

    mountQier();
    (function(){
      var scheduled=false;
      function schedule(){
        if(scheduled) return;
        scheduled=true;
        if('requestIdleCallback' in window){
          requestIdleCallback(function(){nonCriticalInit()},{timeout:1200});
        }else{
          setTimeout(function(){nonCriticalInit()},300);
        }
      }
      if(v && !v._initDeferHooked2){
        v._initDeferHooked2=true;
        v.addEventListener('playing',function(){nonCriticalInit()},{once:true,passive:true});
      }
      if(uiCompact){
        if(rawUrl){
          var playUrlInit=resolve(rawUrl);
          start(playUrlInit);
          applyDirectLiveContext();
          schedule();
        }else{
          schedule();
        }
      }else{
        if(rawUrl){
          try{
            var playUrlInit2=resolve(rawUrl);
            start(playUrlInit2);
            applyDirectLiveContext();
          }catch(e){}
        }
        schedule();
      }
    })();
  </script>
</body>

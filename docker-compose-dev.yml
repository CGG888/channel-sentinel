services:
  channel-sentinel-dev:
    build: .
    container_name: channel-sentinel-dev
    network_mode: "host"
    environment:
      - NODE_ENV=development
      - TZ=Asia/Shanghai
      - PORT=${IPTV_PORT:-3000}
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./public:/app/public
      - ./.git:/app/.git
    restart: unless-stopped
